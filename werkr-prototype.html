<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WERKR — Interaktiver Prototyp</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#111}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,textarea,select{font-family:inherit;outline:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#e5e4e0;border-radius:3px}
#sidebar{width:248px;min-height:100vh;background:#1a1a1a;border-right:1px solid #333;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
#main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:32px 24px;min-height:100vh}
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;position:sticky;top:32px}
.phone{width:390px;height:780px;background:#F5F4F0;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 0 0 10px #2a2a2a,0 0 0 11px #3a3a3a,0 40px 120px rgba(0,0,0,.8);flex-shrink:0}
.screen{height:100%;overflow-y:auto;overflow-x:hidden;position:relative}
.hint{color:#555;font-size:11px;letter-spacing:.5px;text-align:center}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid #2a2a2a}
.sb-logo-row{display:flex;align-items:center;gap:8px}
.sb-logo-icon{width:32px;height:32px;background:#FBF5E4;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.sb-logo-text{font-size:16px;font-weight:800;color:#fff;letter-spacing:1.5px}
.sb-logo-sub{font-size:10px;color:#555;margin-top:4px;padding-left:40px}
.sb-group{padding:8px 0}
.sb-label{font-size:9px;font-weight:700;color:#444;letter-spacing:1.2px;text-transform:uppercase;padding:0 16px 6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;transition:background .15s}
.sb-item:hover{background:#252525}
.sb-item.active{background:#2d2a22;border-right:2px solid #B8930A}
.sb-icon{font-size:14px;width:18px;text-align:center}
.sb-name{font-size:12px;color:#aaa;font-weight:500}
.sb-item.active .sb-name{color:#B8930A;font-weight:600}
.sb-sep{height:1px;background:#222;margin:4px 0}
@media(max-width:700px){#sidebar{display:none}#main{padding:0}.phone{width:100vw;height:100vh;border-radius:0;box-shadow:none}.phone-wrap{gap:0}.hint{display:none}}
#mob-btn{display:none;position:fixed;bottom:18px;right:18px;z-index:900;background:#111;color:#fff;border-radius:50px;padding:11px 18px;font-size:13px;font-weight:700;align-items:center;gap:7px;box-shadow:0 4px 24px rgba(0,0,0,.45);border:none;cursor:pointer}
#mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(max-width:700px){#mob-btn{display:flex}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;
const C={bg:'#F5F4F0',surface:'#fff',border:'#E5E4E0',ink:'#111',sub:'#636363',muted:'#A5A5A5',gold:'#B8930A',goldBg:'#FBF5E4',green:'#1A7A48',greenBg:'#E8F5EE',red:'#C22B2B',redBg:'#FDEAEA',amber:'#C07010',amberBg:'#FEF3E2'};

function Badge({label,v='muted'}){
  const bg={gold:C.goldBg,green:C.greenBg,red:C.redBg,amber:C.amberBg,muted:'#f0efeb'}[v];
  const col={gold:C.gold,green:C.green,red:C.red,amber:C.amber,muted:C.sub}[v];
  return <span style={{display:'inline-flex',alignItems:'center',padding:'2px 8px',borderRadius:20,fontSize:10,fontWeight:700,background:bg,color:col}}>{label}</span>;
}
function Stars({v=5,size=13}){
  return <span style={{display:'inline-flex',gap:1,lineHeight:1}}>{[1,2,3,4,5].map(i=><span key={i} style={{fontSize:size,color:i<=Math.round(v)?C.gold:'#ddd'}}>★</span>)}</span>;
}
function Bar({val,max,label}){
  const pct=Math.min(100,Math.round(val/max*100));
  const col=pct>85?C.red:pct>70?C.amber:C.green;
  return <div style={{marginBottom:8}}>
    {label&&<div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:C.sub,marginBottom:3}}><span>{label}</span><span style={{fontWeight:700,color:col}}>{val}/{max}</span></div>}
    <div style={{height:7,background:C.border,borderRadius:4}}><div style={{height:'100%',width:pct+'%',background:col,borderRadius:4}}/></div>
  </div>;
}
function Hdr({title,back,right}){
  return <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'15px 20px',background:C.surface,borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,zIndex:10}}>
    {back?<button onClick={back} style={{fontSize:22,color:C.ink,lineHeight:1,padding:2}}>‹</button>:<div style={{width:26}}/>}
    <span style={{fontSize:15,fontWeight:800,color:C.ink}}>{title}</span>
    {right||<div style={{width:26}}/>}
  </div>;
}
function Card({ch,style={},click}){
  return <div onClick={click} style={{background:C.surface,borderRadius:12,border:`1px solid ${C.border}`,padding:14,...style,cursor:click?'pointer':'default'}}>{ch}</div>;
}
function Btn({label,onClick,col=C.ink,tc='#fff',style={}}){
  return <button onClick={onClick} style={{width:'100%',padding:'14px',background:col,borderRadius:12,color:tc,fontSize:14,fontWeight:700,...style}}>{label}</button>;
}

// ─── SCREENS ────────────────────────────────────────────────────────────────

function Landing({go}){
  return <div style={{height:'100%',overflow:'auto',background:C.bg}}>
    <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:30,height:30,background:C.goldBg,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}}>🔨</div>
        <span style={{fontSize:17,fontWeight:900,letterSpacing:2}}>WERKR</span>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>go('onboarding')} style={{padding:'7px 12px',border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,fontWeight:600}}>Einloggen</button>
        <button onClick={()=>go('onboarding')} style={{padding:'7px 12px',background:C.ink,borderRadius:8,fontSize:12,fontWeight:700,color:'#fff'}}>Starten</button>
      </div>
    </div>
    <div style={{padding:'36px 20px 28px'}}>
      <div style={{display:'inline-flex',alignItems:'center',gap:6,background:C.greenBg,borderRadius:20,padding:'5px 12px',marginBottom:18}}>
        <div style={{width:6,height:6,background:C.green,borderRadius:'50%'}}/><span style={{fontSize:11,fontWeight:600,color:C.green}}>Live in Köln &amp; Umgebung</span>
      </div>
      <div style={{fontSize:42,fontWeight:900,letterSpacing:2,marginBottom:8}}>WERKR</div>
      <div style={{fontSize:18,fontWeight:700,lineHeight:1.4,marginBottom:12}}>Handwerker &amp; Nachbarschaftshilfe —<br/>einfach, sicher, fair</div>
      <div style={{fontSize:13,color:C.sub,lineHeight:1.7,marginBottom:28}}>Geprüfte Profis in Ihrer Nähe. Zahlungen via Stripe Escrow gesichert. Nur <strong>8% Plattformgebühr</strong>.</div>
      <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:24}}>
        <Btn label="🔍 Handwerker finden" onClick={()=>go('home')}/>
        <Btn label="🔧 Als Anbieter registrieren" onClick={()=>go('kyc-handwerker')} col={C.surface} tc={C.ink} style={{border:`1.5px solid ${C.border}`}}/>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {['M','Y','S','T'].map((l,i)=><div key={i} style={{width:28,height:28,background:C.goldBg,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:C.gold,marginLeft:i>0?-8:0,border:`2px solid ${C.surface}`}}>{l}</div>)}
        <span style={{fontSize:12,color:C.sub,marginLeft:8}}><strong>400+ Handwerker</strong> registriert</span>
      </div>
    </div>
    <div style={{background:C.surface,borderTop:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,padding:'12px 20px',display:'flex',gap:14,flexWrap:'wrap'}}>
      {['🛡️ PStTG-konform','💳 Stripe Escrow','✅ 18+ Verifiziert','⭐ Bewertungssystem'].map(t=><span key={t} style={{fontSize:11,fontWeight:600}}>{t}</span>)}
    </div>
    <div style={{padding:'24px 20px'}}>
      <div style={{fontSize:10,fontWeight:700,color:C.gold,letterSpacing:1.5,marginBottom:6}}>WARUM WERKR</div>
      <div style={{fontSize:19,fontWeight:800,marginBottom:16}}>Gebaut für Vertrauen</div>
      {[['🛡️','Geprüfte Profis','Gewerbeschein, Ausweis und Steuer-ID — jeder Anbieter vollständig verifiziert.'],
        ['🔒','Escrow-Zahlung','Geld eingefroren bis zur Fertigstellung. Erst nach Freigabe wird ausgezahlt.'],
        ['⭐','Bewertungssystem','5-Sterne-Bewertungen nach jedem Auftrag. Strike-System sichert Qualität.'],
      ].map(([ic,t,d])=><div key={t} style={{background:C.surface,borderRadius:12,border:`1px solid ${C.border}`,padding:16,marginBottom:10}}>
        <div style={{fontSize:22,marginBottom:8}}>{ic}</div>
        <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{t}</div>
        <div style={{fontSize:12,color:C.sub,lineHeight:1.6}}>{d}</div>
      </div>)}
    </div>
    <div style={{padding:'0 20px 24px'}}>
      <div style={{fontSize:10,fontWeight:700,color:C.gold,letterSpacing:1.5,marginBottom:6}}>TRANSPARENTE KOSTEN</div>
      <div style={{fontSize:19,fontWeight:800,marginBottom:14}}>Nur 8% — keine Überraschungen</div>
      <div style={{background:C.surface,borderRadius:12,border:`1px solid ${C.border}`,padding:16}}>
        {[['Job-Betrag','€240,00',C.ink],['WERKR Gebühr (8%)','−€19,20',C.red]].map(([l,v,c])=><div key={l} style={{display:'flex',justifyContent:'space-between',marginBottom:10}}><span style={{fontSize:13,color:C.sub}}>{l}</span><span style={{fontSize:13,fontWeight:700,color:c}}>{v}</span></div>)}
        <div style={{height:1,background:C.border,margin:'8px 0 12px'}}/>
        <div style={{display:'flex',justifyContent:'space-between'}}>
          <span style={{fontSize:13,fontWeight:700}}>Auszahlung Anbieter</span>
          <span style={{fontSize:15,fontWeight:800,color:C.green}}>€220,80</span>
        </div>
      </div>
    </div>
    <div style={{padding:'24px 20px',background:C.goldBg,borderTop:`1px solid #E8D69A`,borderBottom:`1px solid #E8D69A`}}>
      <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>Geld verdienen als Anbieter</div>
      <div style={{fontSize:13,fontWeight:600,color:C.gold,marginBottom:14}}>0€ Startgebühr, nur 8% pro Auftrag</div>
      <div style={{display:'flex',background:C.surface,borderRadius:12,padding:'14px 8px',marginBottom:18,border:'1px solid #E8D69A'}}>
        {[['€0','Startgebühr'],['8%','Pro Auftrag'],['24h','Verifizierung']].map(([v,l])=><div key={l} style={{flex:1,textAlign:'center'}}><div style={{fontSize:22,fontWeight:900}}>{v}</div><div style={{fontSize:10,color:C.sub}}>{l}</div></div>)}
      </div>
      <Btn label="→ Jetzt als Anbieter registrieren" onClick={()=>go('kyc-handwerker')}/>
    </div>
    <div style={{background:'#111',padding:'20px'}}>
      <div style={{fontSize:15,fontWeight:800,color:'#fff',letterSpacing:1.5,marginBottom:4}}>WERKR</div>
      <div style={{fontSize:11,color:'rgba(255,255,255,.35)'}}>© 2025 WERKR GmbH · Köln</div>
    </div>
  </div>;
}

function Onboarding({go}){
  return <div style={{height:'100%',overflow:'auto',background:C.bg,padding:'40px 20px'}}>
    <div style={{textAlign:'center',marginBottom:32}}>
      <div style={{fontSize:36,fontWeight:900,letterSpacing:3,marginBottom:6}}>WERKR</div>
      <div style={{fontSize:14,color:C.sub}}>Wähle deine Rolle</div>
    </div>
    {[{ic:'🔍',t:'Ich suche Hilfe',d:'Handwerker & Nachbarschaftshilfe finden',bg:C.ink,tc:'#fff',go:'home'},
      {ic:'🔧',t:'Ich biete Hilfe an',d:'Als Handwerker oder Helfer Aufträge gewinnen',bg:C.surface,tc:C.ink,go:'kyc-handwerker'}
    ].map(r=><button key={r.t} onClick={()=>go(r.go)} style={{display:'block',width:'100%',padding:'20px',background:r.bg,borderRadius:14,border:`1.5px solid ${C.border}`,textAlign:'left',marginBottom:12}}>
      <div style={{fontSize:26,marginBottom:8}}>{r.ic}</div>
      <div style={{fontSize:15,fontWeight:800,color:r.tc,marginBottom:4}}>{r.t}</div>
      <div style={{fontSize:12,color:r.bg===C.ink?'rgba(255,255,255,.6)':C.sub}}>{r.d}</div>
    </button>)}
    <div style={{display:'flex',justifyContent:'space-around',padding:'16px 0',borderTop:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,margin:'8px 0 16px'}}>
      {[['🛡️','Geprüfte Profile'],['💳','Escrow'],['⭐','Bewertungen']].map(([ic,t])=><div key={t} style={{textAlign:'center'}}><div style={{fontSize:18,marginBottom:3}}>{ic}</div><div style={{fontSize:10,color:C.muted}}>{t}</div></div>)}
    </div>
    <div style={{fontSize:11,color:C.muted,textAlign:'center',lineHeight:1.6}}>Nur für Personen ab 18 Jahren (§ JArbSchG). Mit Registrierung stimmst du AGB &amp; Datenschutz zu.</div>
  </div>;
}

function KYC({go,track}){
  const [step,setStep]=useState(0);
  const [t,setT]=useState(track||'handwerker');
  const [dob,setDob]=useState('');
  const [dobErr,setDobErr]=useState('');
  const [rate,setRate]=useState('15');
  const calcAge=d=>{const p=d.split('.');if(p.length!==3)return null;const[dd,mm,yy]=p.map(Number);if(!dd||!mm||!yy||yy<1900)return null;const b=new Date(yy,mm-1,dd),n=new Date();let a=n.getFullYear()-b.getFullYear();if(n<new Date(n.getFullYear(),b.getMonth(),b.getDate()))a--;return a;};
  const handleDob=v=>{const d=v.replace(/\D/g,'').slice(0,8);let f=d;if(d.length>2)f=d.slice(0,2)+'.'+d.slice(2);if(d.length>4)f=f.slice(0,5)+'.'+d.slice(4);setDob(f);setDobErr('');};
  const next=()=>{
    if(t==='nachbarschaft'&&step===0&&dob){const a=calcAge(dob);if(a===null){setDobErr('Ungültiges Datum.');return;}if(a<18){setDobErr(`Du bist ${a} Jahre alt. Mindestalter 18 Jahre (§ JArbSchG). WERKR ist nicht für Minderjährige.`);return;}}
    setStep(s=>s+1);
  };
  const total=t==='handwerker'?4:2;
  const done=step>=total;
  return <div style={{height:'100%',overflow:'auto',background:C.bg}}>
    <Hdr title="Registrierung" back={()=>go('onboarding')}/>
    <div style={{padding:'16px 20px'}}>
      <div style={{display:'flex',background:C.surface,borderRadius:10,border:`1px solid ${C.border}`,padding:3,marginBottom:18,gap:3}}>
        {['handwerker','nachbarschaft'].map(v=><button key={v} onClick={()=>{setT(v);setStep(0);}} style={{flex:1,padding:8,borderRadius:8,background:t===v?C.ink:'transparent',color:t===v?'#fff':C.sub,fontSize:12,fontWeight:600}}>{v==='handwerker'?'🔧 Handwerker':'🤝 Nachbarschaft'}</button>)}
      </div>
      {!done&&<div style={{marginBottom:18}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:C.muted,marginBottom:4}}><span>Schritt {step+1}/{total}</span><span>{Math.round((step+1)/total*100)}%</span></div>
        <div style={{height:4,background:C.border,borderRadius:2}}><div style={{height:'100%',width:((step+1)/total*100)+'%',background:C.green,borderRadius:2,transition:'width .3s'}}/></div>
      </div>}
      {done?<div style={{textAlign:'center',paddingTop:16}}>
        <div style={{fontSize:44,marginBottom:14}}>✅</div>
        <div style={{fontSize:18,fontWeight:800,marginBottom:8}}>Registrierung abgeschlossen!</div>
        <div style={{fontSize:13,color:C.sub,marginBottom:20,lineHeight:1.6}}>Wir prüfen deine Unterlagen innerhalb von 24 Stunden.</div>
        {(t==='handwerker'?['Personalien ✓','Steuer-ID &amp; IBAN ✓','Gewerbeschein ✓','Verifizierung läuft…']:['Personalien ✓','Skills &amp; Stundensatz ✓']).map((x,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:10,borderRadius:10,background:x.includes('läuft')?C.amberBg:C.greenBg,border:`1px solid ${x.includes('läuft')?C.amber:C.green}`,marginBottom:8,fontSize:12,color:x.includes('läuft')?C.amber:C.green,fontWeight:600}} dangerouslySetInnerHTML={{__html:x}}/>)}
        <Btn label={`Zur App →`} onClick={()=>go(t==='handwerker'?'provider-home':'home')} col={C.green} style={{marginTop:16}}/>
      </div>:t==='handwerker'?<>
        {step===0&&<>{['Vorname','Nachname','Adresse','Telefon','E-Mail'].map(f=><div key={f} style={{marginBottom:11}}><div style={{fontSize:12,fontWeight:600,color:C.sub,marginBottom:3}}>{f}</div><input style={{width:'100%',padding:'10px 12px',borderRadius:9,border:`1.5px solid ${C.border}`,fontSize:13}} placeholder={f}/></div>)}</>}
        {step===1&&<>
          <div style={{fontSize:15,fontWeight:800,marginBottom:4}}>Steuer-ID &amp; IBAN</div>
          <div style={{fontSize:12,color:C.sub,marginBottom:14}}>Steuer-ID findest du auf deinem Steuerbescheid oben rechts (11 Stellen)</div>
          <div style={{marginBottom:11}}><div style={{fontSize:12,fontWeight:600,color:C.sub,marginBottom:3}}>Steuer-ID</div><input maxLength={11} style={{width:'100%',padding:'10px 12px',borderRadius:9,border:`1.5px solid ${C.border}`,fontSize:13,letterSpacing:2}} placeholder="12345678901"/></div>
          <div style={{marginBottom:11}}><div style={{fontSize:12,fontWeight:600,color:C.sub,marginBottom:3}}>IBAN</div><input style={{width:'100%',padding:'10px 12px',borderRadius:9,border:`1.5px solid ${C.border}`,fontSize:13}} placeholder="DE89 3704 0044 0532 0130 00"/></div>
        </>}
        {step===2&&<>
          <div style={{fontSize:15,fontWeight:800,marginBottom:14}}>Gewerbenachweis</div>
          <button style={{width:'100%',padding:'28px',border:`2px dashed ${C.border}`,borderRadius:12,background:C.surface,color:C.muted,fontSize:12,marginBottom:14}}>📎 Gewerbeschein hochladen<br/><span style={{fontSize:10}}>PDF, JPG oder PNG</span></button>
          <select style={{width:'100%',padding:'10px 12px',borderRadius:9,border:`1.5px solid ${C.border}`,fontSize:13,background:C.surface}}><option>Sanitär &amp; Heizung</option><option>Elektro</option><option>Schlosserei</option><option>Reinigung</option><option>Sonstiges</option></select>
        </>}
      </>:<>
        {step===0&&<>
          {['Vorname','Nachname','PLZ &amp; Ort'].map(f=><div key={f} style={{marginBottom:11}}><div style={{fontSize:12,fontWeight:600,color:C.sub,marginBottom:3}} dangerouslySetInnerHTML={{__html:f}}/><input style={{width:'100%',padding:'10px 12px',borderRadius:9,border:`1.5px solid ${C.border}`,fontSize:13}} placeholder={f.replace(/&amp;/g,'&')}/></div>)}
          <div style={{marginBottom:dobErr?6:11}}>
            <div style={{fontSize:12,fontWeight:600,color:C.sub,marginBottom:3}}>Geburtsdatum (TT.MM.JJJJ) *</div>
            <input value={dob} onChange={e=>handleDob(e.target.value)} maxLength={10} style={{width:'100%',padding:'10px 12px',borderRadius:9,border:`1.5px solid ${dobErr?C.red:C.border}`,fontSize:13}} placeholder="15.03.1990"/>
            {dobErr&&<div style={{fontSize:11,color:C.red,marginTop:5,padding:'7px 10px',background:C.redBg,borderRadius:8}}>{dobErr}</div>}
            <div style={{fontSize:10,color:C.muted,marginTop:3}}>Pflicht — Mindestalter 18 Jahre (§ JArbSchG)</div>
          </div>
        </>}
        {step===1&&<>
          <div style={{fontSize:15,fontWeight:800,marginBottom:14}}>Skills &amp; Stundensatz</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:18}}>
            {['🧹 Putzen','🛒 Einkaufen','🐕 Gassigehen','🌿 Gartenarbeit','👴 Senioren','🍳 Kochen','📦 Umzug'].map((s,i)=><button key={s} style={{padding:'6px 12px',borderRadius:20,border:`1.5px solid ${i<2?C.ink:C.border}`,background:i<2?C.ink:C.surface,color:i<2?'#fff':C.sub,fontSize:11,fontWeight:600}}>{s}</button>)}
          </div>
          <div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:600,color:C.sub,marginBottom:4}}><span>Stundensatz</span><span style={{color:C.green,fontWeight:800}}>€{rate}/h</span></div>
            <input type="range" min={13} max={50} value={rate} onChange={e=>setRate(e.target.value)} style={{width:'100%',accentColor:C.green}}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:C.muted}}><span>€13 (§ MiLoG Min.)</span><span>€50</span></div>
          </div>
        </>}
      </>}
      {!done&&<Btn label={step===total-1?'Abschließen':'Weiter →'} onClick={next} col={C.green} style={{marginTop:16}}/>}
    </div>
  </div>;
}

function Home({go}){

      <div style={{background:C.goldBg,border:`1px solid #E8D69A`,borderRadius:11,padding:'11px 13px',marginBottom:14,display:'flex',alignItems:'center',gap:11}}>
        <span style={{fontSize:22}}>⭐</span>
        <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700}}>WERKR Pro — €29/Monat</div><div style={{fontSize:10,color:C.sub}}>Featured-Platzierung + Analytics</div></div>
        <button style={{padding:'6px 11px',background:C.gold,borderRadius:7,fontSize:10,fontWeight:700,color:'#fff'}}>Upgrade</button>
      </div>
      {['Unternehmensname','Beschreibung','Radius (km)'].map((l,i)=><div key={l} style={{marginBottom:11}}>
        <div style={{fontSize:11,fontWeight:600,color:C.sub,marginBottom:3}}>{l}</div>
        <input defaultValue={['Yilmaz GmbH','Erfahrener Heizungs- und Sanitär-Spezialist…','15'][i]} style={{width:'100%',padding:'10px 12px',borderRadius:9,border:`1.5px solid ${C.border}`,fontSize:13}}/>
      </div>)}
      <div style={{fontSize:11,fontWeight:600,color:C.sub,marginBottom:7}}>Leistungen</div>
      {services.map((s,i)=><div key={i} style={{display:'flex',gap:7,marginBottom:7}}>
        <input defaultValue={s.n} style={{flex:2,padding:'9px 11px',borderRadius:9,border:`1.5px solid ${C.border}`,fontSize:12}}/>
        <input defaultValue={s.p} style={{flex:1,padding:'9px 11px',borderRadius:9,border:`1.5px solid ${C.border}`,fontSize:12}}/>
        <button onClick={()=>setServices(services.filter((_,j)=>j!==i))} style={{width:34,height:38,background:C.redBg,borderRadius:8,fontSize:15,color:C.red}}>×</button>
      </div>)}
      <button onClick={()=>setServices([...services,{n:'',p:''}])} style={{width:'100%',padding:9,border:`1.5px dashed ${C.border}`,borderRadius:8,fontSize:11,color:C.muted,marginBottom:14}}>+ Leistung hinzufügen</button>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px',background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:16}}>
        <div><div style={{fontSize:12,fontWeight:600}}>Profil sichtbar</div><div style={{fontSize:10,color:C.muted}}>Im Marketplace angezeigt</div></div>
        <div style={{width:40,height:22,background:C.green,borderRadius:11,padding:2,display:'flex',justifyContent:'flex-end'}}><div style={{width:18,height:18,background:'#fff',borderRadius:9}}/></div>
      </div>
      {saved?<div style={{padding:11,background:C.greenBg,border:`1px solid ${C.green}`,borderRadius:9,textAlign:'center',fontSize:12,color:C.green,fontWeight:600}}>✅ Gespeichert!</div>
        :<Btn label="💾 Speichern" onClick={()=>setSaved(true)}/>}
    </div>
  </div>;
}

function Einstellungen({go}){
  return <div style={{height:'100%',overflow:'auto',background:C.bg}}>
    <Hdr title="Einstellungen" back={()=>go('home')}/>
    <div style={{padding:'18px 20px'}}>
      {[{h:'Konto',rows:[['👤','Profil bearbeiten'],['💳','Zahlungsmethoden'],['🔔','Benachrichtigungen']]},
        {h:'Datenschutz (DSGVO)',rows:[['📊','Analyse-Cookies'],['📄','Datenschutzerklärung'],['⬇️','Daten exportieren (Art. 20)'],['↩️','Einwilligung widerrufen']]},
        {h:'Rechtliches',rows:[['📜','AGB'],['🏢','Impressum'],['🛡️','PStTG / DAC7']]},
      ].map(sec=><div key={sec.h} style={{marginBottom:18}}>
        <div style={{fontSize:9,fontWeight:700,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:7}}>{sec.h}</div>
        <div style={{background:C.surface,borderRadius:11,border:`1px solid ${C.border}`}}>
          {sec.rows.map(([ic,l],i)=><div key={l}>
            <div style={{display:'flex',alignItems:'center',gap:11,padding:'12px 15px'}}>
              <span style={{fontSize:14,width:20}}>{ic}</span><span style={{flex:1,fontSize:13}}>{l}</span><span style={{fontSize:14,color:C.muted}}>›</span>
            </div>
            {i<sec.rows.length-1&&<div style={{height:1,background:C.border,marginLeft:46}}/>}
          </div>)}
        </div>
      </div>)}
      <div style={{background:C.surface,borderRadius:11,border:`1px solid ${C.border}`,marginBottom:18}}>
        {[['🚪','Ausloggen',false],['🗑️','Konto löschen (Art. 17 DSGVO)',true]].map(([ic,l,d],i)=><div key={l}>
          <div style={{display:'flex',alignItems:'center',gap:11,padding:'12px 15px'}}><span style={{fontSize:14,width:20}}>{ic}</span><span style={{flex:1,fontSize:13,color:d?C.red:C.ink,fontWeight:d?600:400}}>{l}</span></div>
          {i===0&&<div style={{height:1,background:C.border,marginLeft:46}}/>}
        </div>)}
      </div>
      <div style={{textAlign:'center',fontSize:10,color:C.muted}}>WERKR v1.0.0 · datenschutz@werkr.de<br/>WERKR GmbH · Köln</div>
    </div>
  </div>;
}

function Konto({go}){
  return <div style={{height:'100%',overflow:'auto',background:C.bg}}>
    <div style={{background:C.surface,paddingBottom:20,borderBottom:`1px solid ${C.border}`,textAlign:'center',paddingTop:30}}>
      <div style={{width:72,height:72,borderRadius:36,background:C.ink,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',fontSize:24,fontWeight:800,color:'#fff'}}>MK</div>
      <div style={{fontSize:18,fontWeight:800}}>Max Kunde</div>
      <div style={{fontSize:12,color:C.muted,marginTop:3}}>max.kunde@example.de</div>
      <div style={{display:'flex',gap:6,justifyContent:'center',marginTop:10}}>
        <span style={{display:'flex',alignItems:'center',gap:4,background:C.greenBg,borderRadius:20,padding:'3px 10px',fontSize:11,color:C.green,fontWeight:600}}>✓ Verifiziert</span>
      </div>
    </div>
    <div style={{display:'flex',margin:'16px',background:C.surface,borderRadius:12,border:`1px solid ${C.border}`,overflow:'hidden'}}>
      {[['12','Aufträge'],['4','Anbieter'],['9','Bewertungen']].map(([v,l])=><div key={l} style={{flex:1,textAlign:'center',padding:'14px 0',borderRight:`1px solid ${C.border}`}}>
        <div style={{fontSize:22,fontWeight:800}}>{v}</div><div style={{fontSize:10,color:C.muted,marginTop:2}}>{l}</div>
      </div>)}
    </div>
    <div style={{background:C.surface,borderRadius:12,border:`1px solid ${C.border}`,margin:'0 16px 16px',overflow:'hidden'}}>
      {[['❤️','Meine Anbieter','home'],['📋','Meine Aufträge','auftraege'],['💬','Nachrichten','chat'],['💳','Zahlungsmethoden',null],['⚙️','Einstellungen & DSGVO','einstellungen']].map(([ic,l,r],i,a)=><div key={l}>
        <div onClick={()=>r&&go(r)} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 16px',cursor:r?'pointer':'default'}}>
          <span style={{fontSize:16,width:22}}>{ic}</span><span style={{flex:1,fontSize:14}}>{l}</span><span style={{fontSize:14,color:C.muted}}>›</span>
        </div>
        {i<a.length-1&&<div style={{height:1,background:C.border,marginLeft:50}}/>}
      </div>)}
    </div>
    <button onClick={()=>go('provider-home')} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,width:'calc(100% - 32px)',margin:'0 16px',padding:15,background:C.ink,borderRadius:12,color:'#fff',fontSize:14,fontWeight:700}}>
      🔧 Zum Anbieter-Bereich wechseln
    </button>
  </div>;
}

// ── Navigation ────────────────────────────────────────────────────────────────
const NAV=[
  {g:'Website & Onboarding',items:[{k:'landing',ic:'🏠',n:'Landing / Website'},{k:'onboarding',ic:'👋',n:'Onboarding'},{k:'kyc-handwerker',ic:'🔧',n:'KYC Handwerker'},{k:'kyc-nachbarschaft',ic:'🤝',n:'KYC Nachbarschaft'}]},
  {g:'Kunde',items:[{k:'home',ic:'🔍',n:'Home (Kunde)'},{k:'nachbarschaft',ic:'🤝',n:'Nachbarschaftshilfe'},{k:'suche',ic:'🔎',n:'Suche & Filter'},{k:'profil',ic:'⭐',n:'Handwerker-Profil'},{k:'chat',ic:'💬',n:'Chat + Angebot'},{k:'vertrag',ic:'📄',n:'Digitaler Vertrag'},{k:'bewertung',ic:'⭐',n:'Bewertung abgeben'}]},
  {g:'Aufträge (Kunde)',items:[{k:'auftraege',ic:'📋',n:'Meine Aufträge'},{k:'reklamation',ic:'⚠️',n:'Reklamation'},{k:'konto',ic:'👤',n:'Konto'},{k:'einstellungen',ic:'⚙️',n:'Einstellungen (DSGVO)'}]},
  {g:'Anbieter',items:[{k:'provider-home',ic:'🏠',n:'Provider Dashboard'},{k:'provider-kalender',ic:'📅',n:'Kalender'},{k:'steuer',ic:'💶',n:'Steuer / DAC7'},{k:'provider-profil',ic:'✏️',n:'Profil-Editor'}]},
];

function MobileNav({cur,go,onClose}){
  return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.93)',zIndex:1000,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
    <div style={{padding:'20px 20px 8px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:'rgba(0,0,0,.93)',zIndex:1}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:28,height:28,background:'#FBF5E4',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13}}>🔨</div>
        <span style={{fontSize:15,fontWeight:800,color:'#fff',letterSpacing:1.5}}>WERKR</span>
        <span style={{fontSize:10,color:'#555',marginLeft:4}}>Prototyp</span>
      </div>
      <button onClick={onClose} style={{width:34,height:34,borderRadius:17,background:'#2a2a2a',color:'#aaa',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
    </div>
    <div style={{padding:'8px 16px 40px'}}>
      {NAV.map(sec=><div key={sec.g} style={{marginBottom:20}}>
        <div style={{fontSize:9,fontWeight:700,color:'#444',letterSpacing:1.2,textTransform:'uppercase',padding:'0 4px 8px'}}>{sec.g}</div>
        {sec.items.map(item=><button key={item.k} onClick={()=>{go(item.k);onClose();}} style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'13px 14px',marginBottom:4,borderRadius:11,background:cur===item.k?'#2d2a22':'#1a1a1a',border:cur===item.k?'1px solid #B8930A':'1px solid #2a2a2a',textAlign:'left'}}>
          <span style={{fontSize:18,width:24,textAlign:'center'}}>{item.ic}</span>
          <span style={{fontSize:14,fontWeight:600,color:cur===item.k?'#B8930A':'#ccc'}}>{item.n}</span>
          {cur===item.k&&<span style={{marginLeft:'auto',fontSize:11,color:'#B8930A'}}>●</span>}
        </button>)}
      </div>)}
    </div>
  </div>;
}

function Sidebar({cur,go}){
  return <div id="sidebar">
    <div className="sb-logo">
      <div className="sb-logo-row"><div className="sb-logo-icon">🔨</div><span className="sb-logo-text">WERKR</span></div>
      <div className="sb-logo-sub">Interaktiver Prototyp v2</div>
    </div>
    {NAV.map(sec=><div key={sec.g} className="sb-group">
      <div className="sb-label">{sec.g}</div>
      {sec.items.map(item=><div key={item.k} className={`sb-item${cur===item.k?' active':''}`} onClick={()=>go(item.k)}>
        <span className="sb-icon">{item.ic}</span><span className="sb-name">{item.n}</span>
      </div>)}
      <div className="sb-sep"/>
    </div>)}
  </div>;
}

function App(){
  const [screen,setScreen]=useState('landing');
  const [kycT,setKycT]=useState('handwerker');
  const [menuOpen,setMenuOpen]=useState(false);
  const go=s=>{
    if(s==='kyc-handwerker'){setKycT('handwerker');setScreen('kyc');}
    else if(s==='kyc-nachbarschaft'){setKycT('nachbarschaft');setScreen('kyc');}
    else setScreen(s);
    setMenuOpen(false);
    setTimeout(()=>document.querySelector('.screen')?.scrollTo?.(0,0),0);
  };
  const map={landing:<Landing go={go}/>,onboarding:<Onboarding go={go}/>,kyc:<KYC go={go} track={kycT}/>,home:<Home go={go}/>,nachbarschaft:<Nachbarschaft go={go}/>,suche:<Suche go={go}/>,profil:<Profil go={go}/>,chat:<Chat go={go}/>,vertrag:<Vertrag go={go}/>,bewertung:<Bewertung go={go}/>,auftraege:<Auftraege go={go}/>,reklamation:<Reklamation go={go}/>,konto:<Konto go={go}/>,'provider-home':<ProviderHome go={go}/>,'provider-kalender':<ProviderKalender go={go}/>,steuer:<Steuer go={go}/>,'provider-profil':<ProfilEditor go={go}/>,einstellungen:<Einstellungen go={go}/>};
  const cur=screen==='kyc'?(kycT==='handwerker'?'kyc-handwerker':'kyc-nachbarschaft'):screen;
  return <div style={{display:'flex',minHeight:'100vh'}}>
    <Sidebar cur={cur} go={go}/>
    <div id="main"><div className="phone-wrap">
      <div className="phone"><div className="screen">{map[screen]||map.landing}</div></div>
      <div className="hint">← Sidebar: Screen wählen · Buttons klicken zum Navigieren</div>
    </div></div>
    {menuOpen && <MobileNav cur={cur} go={go} onClose={()=>setMenuOpen(false)}/>}
    <button id="mob-btn" onClick={()=>setMenuOpen(true)}>☰ <span>Alle Screens</span></button>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
