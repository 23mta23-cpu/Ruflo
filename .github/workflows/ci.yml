# CI: Typecheck + Tests bei jedem PR und Push — fängt Regressionen, bevor sie
# in main landen. Bewusst schlank (kein expo export: das macht der Pages-Deploy
# in static.yml selbst; hier zählt schnelles Feedback in ~2-3 Min).
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'claude/**']

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Tests
        run: npx jest --silent

  # Edge Functions (Deno) typechecken — npx tsc deckt supabase/functions/ NICHT
  # ab, die Functions deployen aber bei jedem Push direkt in Produktion. Ein
  # Typfehler würde sonst erst zur Laufzeit auffallen (z. B. fehlgeschlagene
  # Zahlung). deno check fängt ihn vor dem Merge.
  edge-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type-check Edge Functions
        run: |
          # --node-modules-dir=auto: die Stripe-Lib referenziert npm:@types/node;
          # ohne den Flag scheitert deno check in sauberer CI an der Auflösung.
          # esm.sh liefert sporadisch 522 (CDN-Flake, 20.07.) — pro Function
          # bis zu 3 Versuche mit Pause, bevor der Job wirklich rot wird.
          rc=0
          for fn in supabase/functions/*/index.ts; do
            echo "== deno check $fn =="
            ok=0
            for attempt in 1 2 3; do
              if deno check --node-modules-dir=auto "$fn"; then ok=1; break; fi
              echo "-- Versuch $attempt fehlgeschlagen (CDN?), warte 15s --"
              sleep 15
            done
            [ "$ok" = "1" ] || rc=1
          done
          exit $rc

  # DB-Integrationstest: replayt alle Migrationen + prüft Geld-Kern, RLS-Isolation
  # und E-Mail-Gate gegen ein echtes Postgres (scripts/db-test/run.sh im TCP-Modus).
  db-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Ensure psql client
        run: psql --version || (sudo apt-get update && sudo apt-get install -y postgresql-client)
      - name: DB integration tests
        env:
          PGHOST: localhost
          PGPORT: '5432'
          PGUSER: postgres
          PGPASSWORD: postgres
        run: bash scripts/db-test/run.sh
