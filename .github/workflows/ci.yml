# CI: Typecheck + Tests bei jedem PR und Push — fängt Regressionen, bevor sie
# in main landen. Bewusst schlank (kein expo export: das macht der Pages-Deploy
# in static.yml selbst; hier zählt schnelles Feedback in ~2-3 Min).
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'claude/**']

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Tests
        run: npx jest --silent
