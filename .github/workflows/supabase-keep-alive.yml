name: Supabase Keep-Alive

on:
  schedule:
    # Every 3 days at 06:00 UTC — prevents free-tier auto-pause (triggers at 7 days inactivity)
    - cron: '0 6 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SECRET_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SECRET_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          # Repo-level secrets are not set (deploy secrets live in the
          # github-pages environment, invisible to this job). Fall back to the
          # public client values from lib/supabase.ts — the publishable key is
          # RLS-safe and already shipped in the public web bundle.
          URL="${SECRET_URL:-https://chnphpmpdpllnpqtvwhx.supabase.co}"
          KEY="${SECRET_KEY:-sb_publishable_VT6KsxSQDBOYJYbc4qNcgQ_t_NRrh-U}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY" \
            "$URL/rest/v1/profiles?select=id&limit=1")
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "401" ] && [ "$STATUS" != "403" ]; then
            echo "Unexpected status $STATUS — project may be paused or unreachable"
            exit 1
          fi
          echo "Project is active."
