<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WERKR — Interaktiver Prototyp</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;min-height:100vh;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0c0d0e;color:#111;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,textarea,select{font-family:inherit;outline:none}
svg{display:block}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#d8d7d2;border-radius:3px}
#sidebar{width:256px;min-height:100vh;background:#141517;border-right:1px solid #232527;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
#main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:36px 24px;min-height:100vh}
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;position:sticky;top:36px}
.phone{width:390px;height:800px;background:#F5F4F0;border-radius:48px;overflow:hidden;position:relative;box-shadow:0 0 0 11px #1d1f22,0 0 0 12px #34373b,0 50px 130px rgba(0,0,0,.85);flex-shrink:0}
.screen{height:100%;overflow-y:auto;overflow-x:hidden;position:relative}
.hint{color:#54585e;font-size:11px;letter-spacing:.4px;text-align:center;max-width:300px;line-height:1.5}
.sb-logo{padding:22px 18px 18px;border-bottom:1px solid #232527}
.sb-logo-row{display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#1C6B45,#155436);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 2px 10px rgba(28,107,69,.45)}
.sb-logo-text{font-size:17px;font-weight:900;color:#fff;letter-spacing:2px}
.sb-logo-sub{font-size:10px;color:#5b5f66;margin-top:5px;padding-left:44px;letter-spacing:.3px}
.sb-group{padding:10px 0}
.sb-label{font-size:9px;font-weight:800;color:#4b4f56;letter-spacing:1.4px;text-transform:uppercase;padding:0 18px 7px}
.sb-item{display:flex;align-items:center;gap:11px;padding:9px 18px;cursor:pointer;transition:background .15s;color:#9aa0a8}
.sb-item:hover{background:#1d1f22}
.sb-item.active{background:#16271f;border-right:2px solid #1C6B45}
.sb-item.active .sb-name{color:#3DBA7D;font-weight:600}
.sb-item.active .sb-ic{color:#3DBA7D}
.sb-ic{width:18px;display:flex;align-items:center;justify-content:center;color:#6b7078}
.sb-name{font-size:12.5px;color:#9aa0a8;font-weight:500}
.sb-sep{height:1px;background:#1d1f22;margin:6px 0}
@media(max-width:760px){#sidebar{display:none}#main{padding:0}.phone{width:100vw;height:100vh;border-radius:0;box-shadow:none}.phone-wrap{gap:0}.hint{display:none}}
#mob-btn{display:none;position:fixed;bottom:20px;right:20px;z-index:900;background:#1C6B45;color:#fff;border-radius:50px;padding:12px 20px;font-size:13px;font-weight:700;align-items:center;gap:8px;box-shadow:0 6px 26px rgba(28,107,69,.5);border:none;cursor:pointer}
@media(max-width:760px){#mob-btn{display:flex}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

/* ── Design Tokens ───────────────────────────────────────────────────────── */
const C={
  bg:'#F4F3EF', surf:'#FFFFFF', surface:'#FFFFFF', border:'#EAE9E5', hair:'#F0EFEB',
  ink:'#101212', sub:'#595D5F', muted:'#9A9EA2',
  primary:'#1C6B45', primaryBg:'#EAF5EF', primaryBd:'#C2E2CF', primaryDk:'#155436',
  clay:'#C4622D', clayBg:'#FBEEE6',
  green:'#1A7A48', greenBg:'#E9F5EE',
  gold:'#B0860B', goldBg:'#FBF4E2', goldBd:'#E7D49E',
  red:'#C12B2B', redBg:'#FCEAEA',
  amber:'#B5710F', amberBg:'#FDF1E0',
};
const sh={
  xs:'0 1px 2px rgba(16,18,18,.05)',
  sm:'0 1px 3px rgba(16,18,18,.07), 0 1px 2px rgba(16,18,18,.04)',
  md:'0 6px 18px rgba(16,18,18,.09), 0 2px 5px rgba(16,18,18,.05)',
  lg:'0 14px 40px rgba(16,18,18,.14)',
};

/* ── SVG Icons (open-lovable style, stroke-based, no emoji) ───────────────── */
function Svg({size=20,fill='none',sw=2,style,children}){
  return <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor"
    strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={style}>{children}</svg>;
}
const IconSearch   =({size})=><Svg size={size}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></Svg>;
const IconBriefcase=({size})=><Svg size={size}><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></Svg>;
const IconMessage  =({size})=><Svg size={size}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></Svg>;
const IconUser     =({size})=><Svg size={size}><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a7 7 0 0 1 14 0v1"/></Svg>;
const IconBack     =({size})=><Svg size={size}><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></Svg>;
const IconChevron  =({size=18})=><Svg size={size}><path d="m9 18 6-6-6-6"/></Svg>;
const IconShield   =({size})=><Svg size={size}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></Svg>;
const IconLock     =({size})=><Svg size={size}><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Svg>;
const IconCheck    =({size})=><Svg size={size}><path d="M20 6 9 17l-5-5"/></Svg>;
const IconSend     =({size})=><Svg size={size} sw={2.2}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></Svg>;
const IconSettings =({size})=><Svg size={size}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></Svg>;
const IconMapPin   =({size=13})=><Svg size={size}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Svg>;
const IconCalendar =({size=13})=><Svg size={size}><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></Svg>;
const IconHeart    =({size,filled})=><Svg size={size} fill={filled?'currentColor':'none'}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"/></Svg>;
const IconHammer   =({size})=><Svg size={size}><path d="m15 12-8.5 8.5a2.12 2.12 0 1 1-3-3L12 9"/><path d="M17.64 15 22 10.64"/><path d="m20.91 11.7-1.25-1.25c-.6-.6-.93-1.4-.93-2.25v-.86L16.01 4.6a5.56 5.56 0 0 0-3.94-1.64H9l.92.82A6.18 6.18 0 0 1 12 8.4v1.56l2 2h.86c.85 0 1.65.33 2.25.93l1.25 1.25"/></Svg>;
const IconHandshake=({size})=><Svg size={size}><path d="m11 17 2 2a1 1 0 1 0 3-3"/><path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-3-3l2.81-2.81a5.79 5.79 0 0 1 7.06-.87l.47.28a2 2 0 0 0 1.42.25L21 4"/><path d="m21 3 1 11h-2"/><path d="M3 3 2 14l6.5 6.5a1 1 0 1 0 3-3"/><path d="M3 4h8"/></Svg>;
const IconPlus     =({size})=><Svg size={size}><path d="M12 5v14M5 12h14"/></Svg>;
const IconRepeat   =({size=13})=><Svg size={size}><path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></Svg>;
const IconAlert    =({size})=><Svg size={size}><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><path d="M12 9v4M12 17h.01"/></Svg>;
const IconDoc      =({size})=><Svg size={size}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></Svg>;
const IconChart    =({size})=><Svg size={size}><path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-3"/></Svg>;
const IconWallet   =({size})=><Svg size={size}><path d="M19 7V5a2 2 0 0 0-2-2H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1H3"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/><path d="M18 12a1 1 0 0 0 0 2h2"/></Svg>;
const IconBell     =({size})=><Svg size={size}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></Svg>;
const IconCard     =({size})=><Svg size={size}><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></Svg>;
const IconCamera   =({size})=><Svg size={size}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3Z"/><circle cx="12" cy="13" r="3"/></Svg>;
const IconUpload   =({size})=><Svg size={size}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8 12 3 7 8M12 3v12"/></Svg>;
const IconArrowR   =({size=16})=><Svg size={size}><path d="M5 12h14M12 5l7 7-7 7"/></Svg>;
const IconLogout   =({size})=><Svg size={size}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></Svg>;
const IconTrash    =({size})=><Svg size={size}><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></Svg>;
const IconEdit     =({size})=><Svg size={size}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></Svg>;
const IconImage    =({size})=><Svg size={size}><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.09-3.09a2 2 0 0 0-2.82 0L6 21"/></Svg>;
const IconClock    =({size=13})=><Svg size={size}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></Svg>;
const IconFile     =({size})=><Svg size={size}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></Svg>;
const IconStar=({size=14,filled})=><Svg size={size} sw={1.5} fill={filled?'currentColor':'none'}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></Svg>;

/* ── Primitives ──────────────────────────────────────────────────────────── */
function Badge({label,v='muted',icon}){
  const bg={primary:C.primaryBg,gold:C.goldBg,green:C.greenBg,red:C.redBg,amber:C.amberBg,muted:C.hair}[v];
  const col={primary:C.primary,gold:C.gold,green:C.green,red:C.red,amber:C.amber,muted:C.sub}[v];
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 9px',borderRadius:7,fontSize:10.5,fontWeight:700,letterSpacing:.1,background:bg,color:col}}>{icon&&<span style={{display:'flex'}}>{icon}</span>}{label}</span>;
}
function Stars({v=5,size=13}){
  return <span style={{display:'inline-flex',gap:1.5,lineHeight:1,color:C.gold}}>
    {[1,2,3,4,5].map(i=><span key={i} style={{color:i<=Math.round(v)?C.gold:'#dcdbd6'}}><IconStar size={size} filled={i<=Math.round(v)}/></span>)}
  </span>;
}
function Bar({val,max,label}){
  const pct=Math.min(100,Math.round(val/max*100));
  const col=pct>85?C.red:pct>70?C.amber:C.primary;
  return <div style={{marginBottom:10}}>
    {label&&<div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,color:C.sub,marginBottom:5}}><span>{label}</span><span style={{fontWeight:700,color:col}}>{val}/{max}</span></div>}
    <div style={{height:7,background:C.hair,borderRadius:5}}><div style={{height:'100%',width:pct+'%',background:col,borderRadius:5,transition:'width .4s'}}/></div>
  </div>;
}
function Hdr({title,back,right,sub}){
  return <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'15px 18px',background:C.surf,borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,zIndex:10}}>
    {back?<button onClick={back} style={{width:34,height:34,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',color:C.ink,background:C.hair}}><IconBack size={18}/></button>:<div style={{width:34}}/>}
    <div style={{textAlign:'center'}}>
      <div style={{fontSize:15.5,fontWeight:800,color:C.ink,letterSpacing:-.2}}>{title}</div>
      {sub&&<div style={{fontSize:10.5,color:C.muted,marginTop:1}}>{sub}</div>}
    </div>
    {right||<div style={{width:34}}/>}
  </div>;
}
function Card({ch,style={},click}){
  return <div onClick={click} style={{background:C.surf,borderRadius:16,boxShadow:sh.sm,padding:15,...style,cursor:click?'pointer':'default'}}>{ch}</div>;
}
function Btn({label,icon,onClick,col=C.primary,tc='#fff',style={}}){
  return <button onClick={onClick} style={{width:'100%',padding:'14px 16px',background:col,borderRadius:13,color:tc,fontSize:14.5,fontWeight:700,letterSpacing:.1,display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:col===C.primary?'0 4px 14px rgba(28,107,69,.28)':'none',...style}}>{icon}{label}</button>;
}
function Avatar({txt,size=46,tone='gold'}){
  const map={gold:[C.goldBg,C.gold],primary:[C.primaryBg,C.primary],ink:[C.ink,'#fff']};
  const [bg,fg]=map[tone];
  return <div style={{width:size,height:size,borderRadius:size/2,background:bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*0.34,fontWeight:800,color:fg,flexShrink:0,letterSpacing:.3}}>{txt}</div>;
}

function CustomerTabBar({cur,go}){
  const tabs=[
    {k:'home',Icon:IconSearch,label:'Entdecken'},
    {k:'auftraege',Icon:IconBriefcase,label:'Aufträge'},
    {k:'nachrichten',Icon:IconMessage,label:'Nachrichten',badge:3},
    {k:'konto',Icon:IconUser,label:'Profil'},
  ];
  return <div style={{display:'flex',borderTop:`1px solid ${C.border}`,background:C.surf,flexShrink:0,paddingBottom:6,boxShadow:'0 -2px 14px rgba(16,18,18,.04)'}}>
    {tabs.map(({k,Icon,label,badge})=>{
      const a=cur===k;
      return <button key={k} onClick={()=>go(k)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'11px 4px 7px',gap:4,position:'relative'}}>
        {a&&<div style={{position:'absolute',top:0,left:'26%',right:'26%',height:2.5,background:C.primary,borderRadius:'0 0 3px 3px'}}/>}
        <div style={{position:'relative',color:a?C.primary:C.muted,transition:'color .15s'}}>
          <Icon size={22}/>
          {badge&&<div style={{position:'absolute',top:-4,right:-7,background:C.red,borderRadius:9,minWidth:15,height:15,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800,color:'#fff',padding:'0 3px',border:'1.5px solid #fff'}}>{badge}</div>}
        </div>
        <span style={{fontSize:10,fontWeight:a?700:500,color:a?C.ink:C.muted,letterSpacing:.1}}>{label}</span>
      </button>;
    })}
  </div>;
}

/* ── SCREENS ─────────────────────────────────────────────────────────────── */

function Landing({go}){
  return <div style={{height:'100%',overflow:'auto',background:C.bg}}>
    {/* Dark hero */}
    <div style={{background:'#101212',padding:'18px 22px 40px',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:-60,right:-50,width:200,height:200,borderRadius:'50%',background:'radial-gradient(circle,rgba(28,107,69,.35),transparent 70%)'}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',position:'relative',marginBottom:38}}>
        <div style={{display:'flex',alignItems:'center',gap:9}}>
          <div style={{width:32,height:32,background:'linear-gradient(135deg,#1C6B45,#155436)',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}><IconHammer size={17}/></div>
          <span style={{fontSize:17,fontWeight:900,letterSpacing:2.5,color:'#fff'}}>WERKR</span>
        </div>
        <button onClick={()=>go('onboarding')} style={{padding:'8px 15px',background:'rgba(255,255,255,.1)',borderRadius:9,fontSize:12.5,fontWeight:600,color:'#fff',backdropFilter:'blur(8px)'}}>Einloggen</button>
      </div>
      <div style={{position:'relative'}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:7,background:'rgba(61,186,125,.14)',borderRadius:20,padding:'6px 13px',marginBottom:22}}>
          <div style={{width:6,height:6,background:'#3DBA7D',borderRadius:'50%',boxShadow:'0 0 8px #3DBA7D'}}/><span style={{fontSize:11,fontWeight:600,color:'#3DBA7D'}}>Live in Köln &amp; Umgebung</span>
        </div>
        <div style={{fontSize:33,fontWeight:900,letterSpacing:-1.2,lineHeight:1.1,color:'#fff',marginBottom:14}}>Handwerk &amp;<br/>Nachbarschafts&shy;hilfe — <span style={{color:'#3DBA7D'}}>fair geregelt.</span></div>
        <div style={{fontSize:13.5,color:'rgba(255,255,255,.6)',lineHeight:1.65,marginBottom:26,maxWidth:300}}>Geprüfte Profis in deiner Nähe. Zahlungen via Stripe&nbsp;Escrow gesichert. Nur <strong style={{color:'#fff'}}>8&nbsp;% Plattformgebühr</strong>.</div>
        <div style={{display:'flex',flexDirection:'column',gap:11,marginBottom:24}}>
          <Btn label="Handwerker finden" icon={<IconSearch size={18}/>} onClick={()=>go('home')}/>
          <button onClick={()=>go('kyc-handwerker')} style={{width:'100%',padding:'14px',background:'rgba(255,255,255,.08)',borderRadius:13,color:'#fff',fontSize:14.5,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8,border:'1px solid rgba(255,255,255,.14)'}}><IconHammer size={17}/>Als Anbieter starten</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {['M','Y','S','T'].map((l,i)=><div key={i} style={{width:30,height:30,background:'#1C6B45',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:'#fff',marginLeft:i>0?-9:0,border:'2px solid #101212'}}>{l}</div>)}
          <span style={{fontSize:12,color:'rgba(255,255,255,.55)',marginLeft:6}}><strong style={{color:'#fff'}}>400+ Handwerker</strong> registriert</span>
        </div>
      </div>
    </div>

    {/* Trust strip */}
    <div style={{background:C.surf,borderBottom:`1px solid ${C.border}`,padding:'14px 20px',display:'flex',gap:18,flexWrap:'wrap'}}>
      {[[<IconShield size={14}/>,'PStTG-konform'],[<IconCard size={14}/>,'Stripe Escrow'],[<IconCheck size={14}/>,'18+ Verifiziert'],[<IconStar size={14} filled/>,'Bewertungen']].map(([ic,t],i)=><span key={i} style={{display:'flex',alignItems:'center',gap:6,fontSize:11.5,fontWeight:600,color:C.sub}}><span style={{color:C.primary}}>{ic}</span>{t}</span>)}
    </div>

    {/* Features */}
    <div style={{padding:'26px 20px 6px'}}>
      <div style={{fontSize:10.5,fontWeight:800,color:C.primary,letterSpacing:1.6,marginBottom:7}}>WARUM WERKR</div>

function KYC({go,track}){
  const [step,setStep]=useState(0);
  const [t,setT]=useState(track||'handwerker');
  const [dob,setDob]=useState('');
  const [dobErr,setDobErr]=useState('');
  const [rate,setRate]=useState('15');
  const calcAge=d=>{const p=d.split('.');if(p.length!==3)return null;const[dd,mm,yy]=p.map(Number);if(!dd||!mm||!yy||yy<1900)return null;const b=new Date(yy,mm-1,dd),n=new Date();let a=n.getFullYear()-b.getFullYear();if(n<new Date(n.getFullYear(),b.getMonth(),b.getDate()))a--;return a;};
  const handleDob=v=>{const d=v.replace(/\D/g,'').slice(0,8);let f=d;if(d.length>2)f=d.slice(0,2)+'.'+d.slice(2);if(d.length>4)f=f.slice(0,5)+'.'+d.slice(4);setDob(f);setDobErr('');};
  const next=()=>{
    if(t==='nachbarschaft'&&step===0&&dob){const a=calcAge(dob);if(a===null){setDobErr('Ungültiges Datum.');return;}if(a<18){setDobErr(`Du bist ${a} Jahre alt. Mindestalter 18 Jahre (§ JArbSchG). WERKR ist nicht für Minderjährige.`);return;}}
    setStep(s=>s+1);
  };
  const total=t==='handwerker'?4:2;
  const done=step>=total;
  const inp={width:'100%',padding:'11px 13px',borderRadius:11,border:`1.5px solid ${C.border}`,fontSize:13,background:C.surf};
  const lbl={fontSize:12,fontWeight:600,color:C.sub,marginBottom:4};
  return <div style={{height:'100%',overflow:'auto',background:C.bg}}>
    <Hdr title="Registrierung" back={()=>go('onboarding')}/>
    <div style={{padding:'18px 20px'}}>
      <div style={{display:'flex',background:C.surf,borderRadius:12,boxShadow:sh.xs,padding:4,marginBottom:20,gap:4}}>
        {['handwerker','nachbarschaft'].map(v=><button key={v} onClick={()=>{setT(v);setStep(0);}} style={{flex:1,padding:9,borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',gap:6,background:t===v?C.ink:'transparent',color:t===v?'#fff':C.sub,fontSize:12.5,fontWeight:600}}>{v==='handwerker'?<IconHammer size={14}/>:<IconHandshake size={14}/>}{v==='handwerker'?'Handwerker':'Nachbarschaft'}</button>)}
      </div>
      {!done&&<div style={{marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:C.muted,marginBottom:5}}><span>Schritt {step+1} von {total}</span><span>{Math.round((step+1)/total*100)}%</span></div>
        <div style={{height:5,background:C.border,borderRadius:3}}><div style={{height:'100%',width:((step+1)/total*100)+'%',background:C.primary,borderRadius:3,transition:'width .3s'}}/></div>
      </div>}
      {done?<div style={{textAlign:'center',paddingTop:14}}>
        <div style={{width:72,height:72,borderRadius:36,background:C.primaryBg,color:C.primary,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 18px'}}><IconCheck size={36}/></div>
        <div style={{fontSize:19,fontWeight:800,marginBottom:8,letterSpacing:-.4}}>Registrierung abgeschlossen!</div>
        <div style={{fontSize:13,color:C.sub,marginBottom:22,lineHeight:1.6}}>Wir prüfen deine Unterlagen innerhalb von 24 Stunden.</div>
        {(t==='handwerker'?[['Personalien',1],['Steuer-ID & IBAN',1],['Gewerbeschein',1],['Verifizierung läuft…',0]]:[['Personalien',1],['Skills & Stundensatz',1]]).map(([x,ok],i)=><div key={i} style={{display:'flex',alignItems:'center',gap:9,padding:12,borderRadius:12,background:ok?C.primaryBg:C.amberBg,marginBottom:8,fontSize:12.5,color:ok?C.primary:C.amber,fontWeight:600}}>{ok?<IconCheck size={16}/>:<IconClock size={16}/>}{x}</div>)}
        <Btn label="Zur App" icon={<IconArrowR/>} onClick={()=>go(t==='handwerker'?'provider-home':'home')} style={{marginTop:18}}/>
      </div>:t==='handwerker'?<>
        {step===0&&<>{['Vorname','Nachname','Adresse','Telefon','E-Mail'].map(f=><div key={f} style={{marginBottom:12}}><div style={lbl}>{f}</div><input style={inp} placeholder={f}/></div>)}</>}
        {step===1&&<>
          <div style={{fontSize:16,fontWeight:800,marginBottom:4,letterSpacing:-.3}}>Steuer-ID &amp; IBAN</div>
          <div style={{fontSize:12,color:C.sub,marginBottom:16,lineHeight:1.5}}>Steuer-ID findest du auf deinem Steuerbescheid oben rechts (11 Stellen)</div>
          <div style={{marginBottom:12}}><div style={lbl}>Steuer-ID</div><input maxLength={11} style={{...inp,letterSpacing:2}} placeholder="12345678901"/></div>
          <div style={{marginBottom:12}}><div style={lbl}>IBAN</div><input style={inp} placeholder="DE89 3704 0044 0532 0130 00"/></div>
        </>}
        {step===2&&<>
          <div style={{fontSize:16,fontWeight:800,marginBottom:16,letterSpacing:-.3}}>Gewerbenachweis</div>
          <button style={{width:'100%',padding:'30px',border:`2px dashed ${C.border}`,borderRadius:14,background:C.surf,color:C.muted,fontSize:12,marginBottom:14,display:'flex',flexDirection:'column',alignItems:'center',gap:8}}><IconUpload size={26}/>Gewerbeschein hochladen<span style={{fontSize:10}}>PDF, JPG oder PNG</span></button>
          <select style={{...inp}}><option>Sanitär & Heizung</option><option>Elektro</option><option>Schlosserei</option><option>Reinigung</option><option>Sonstiges</option></select>
        </>}
      </>:<>
        {step===0&&<>
          {['Vorname','Nachname','PLZ & Ort'].map(f=><div key={f} style={{marginBottom:12}}><div style={lbl}>{f}</div><input style={inp} placeholder={f}/></div>)}
          <div style={{marginBottom:dobErr?6:12}}>
            <div style={lbl}>Geburtsdatum (TT.MM.JJJJ) *</div>
            <input value={dob} onChange={e=>handleDob(e.target.value)} maxLength={10} style={{...inp,border:`1.5px solid ${dobErr?C.red:C.border}`}} placeholder="15.03.1990"/>
            {dobErr&&<div style={{fontSize:11.5,color:C.red,marginTop:6,padding:'8px 11px',background:C.redBg,borderRadius:9,lineHeight:1.4}}>{dobErr}</div>}
            <div style={{fontSize:10,color:C.muted,marginTop:4}}>Pflicht — Mindestalter 18 Jahre (§ JArbSchG)</div>
          </div>
        </>}
        {step===1&&<>
          <div style={{fontSize:16,fontWeight:800,marginBottom:16,letterSpacing:-.3}}>Skills &amp; Stundensatz</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:20}}>
            {['Putzen','Einkaufen','Gassigehen','Gartenarbeit','Senioren','Kochen','Umzug'].map((s,i)=><button key={s} style={{padding:'8px 14px',borderRadius:20,border:`1.5px solid ${i<2?C.ink:C.border}`,background:i<2?C.ink:C.surf,color:i<2?'#fff':C.sub,fontSize:12,fontWeight:600}}>{s}</button>)}
          </div>
          <div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12.5,fontWeight:600,color:C.sub,marginBottom:6}}><span>Stundensatz</span><span style={{color:C.primary,fontWeight:800}}>€{rate}/h</span></div>
            <input type="range" min={13} max={50} value={rate} onChange={e=>setRate(e.target.value)} style={{width:'100%',accentColor:C.primary}}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:C.muted}}><span>€13 (§ MiLoG Min.)</span><span>€50</span></div>
          </div>
        </>}
      </>}
      {!done&&<Btn label={step===total-1?'Abschließen':'Weiter'} icon={step===total-1?<IconCheck size={17}/>:<IconArrowR/>} onClick={next} style={{marginTop:18}}/>}
    </div>
  </div>;
}

function Einstellungen({go}){
  return <div style={{height:'100%',overflow:'auto',background:C.bg}}>
    <Hdr title="Einstellungen" back={()=>go('home')}/>
    <div style={{padding:'18px 20px'}}>
      {[{h:'Konto',rows:[[<IconUser size={16}/>,'Profil bearbeiten'],[<IconCard size={16}/>,'Zahlungsmethoden'],[<IconBell size={16}/>,'Benachrichtigungen']]},
        {h:'Datenschutz (DSGVO)',rows:[[<IconChart size={16}/>,'Analyse-Cookies'],[<IconFile size={16}/>,'Datenschutzerklärung'],[<IconUpload size={16}/>,'Daten exportieren (Art. 20)'],[<IconLock size={16}/>,'Einwilligung widerrufen']]},

              <span style={{color:C.sub,width:20}}>{ic}</span><span style={{flex:1,fontSize:13}}>{l}</span><span style={{color:C.muted}}><IconChevron size={16}/></span>
            </div>
            {i<secg.rows.length-1&&<div style={{height:1,background:C.hair,marginLeft:47}}/>}
          </div>)}
        </div>
      </div>)}
      <div style={{background:C.surf,borderRadius:14,boxShadow:sh.sm,marginBottom:18,overflow:'hidden'}}>
        {[[<IconLogout size={16}/>,'Ausloggen',false],[<IconTrash size={16}/>,'Konto löschen (Art. 17 DSGVO)',true]].map(([ic,l,d],i)=><div key={l}>
          <div style={{display:'flex',alignItems:'center',gap:12,padding:'13px 15px'}}><span style={{color:d?C.red:C.sub,width:20}}>{ic}</span><span style={{flex:1,fontSize:13,color:d?C.red:C.ink,fontWeight:d?600:400}}>{l}</span></div>
          {i===0&&<div style={{height:1,background:C.hair,marginLeft:47}}/>}
        </div>)}
      </div>
      <div style={{textAlign:'center',fontSize:10,color:C.muted,lineHeight:1.6}}>WERKR v1.0.0 · datenschutz@werkr.de<br/>WERKR GmbH · Köln</div>
    </div>
  </div>;
}

    </div>
    <div style={{display:'flex',margin:'16px',background:C.surf,borderRadius:16,boxShadow:sh.sm,overflow:'hidden'}}>
      {[['12','Aufträge'],['4','Anbieter'],['9','Bewertungen']].map(([v,l],i,a)=><div key={l} style={{flex:1,textAlign:'center',padding:'17px 0',borderRight:i<a.length-1?`1px solid ${C.hair}`:'none'}}>

        <div onClick={()=>r&&go(r)} style={{display:'flex',alignItems:'center',gap:13,padding:'14px 16px',cursor:r?'pointer':'default'}}>
          <span style={{color:C.sub,width:22}}>{ic}</span><span style={{flex:1,fontSize:14,color:C.ink}}>{l}</span><span style={{color:C.muted}}><IconChevron size={16}/></span>

    <button onClick={()=>go('provider-home')} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,width:'calc(100% - 32px)',margin:'0 16px 20px',padding:16,background:C.ink,borderRadius:16,color:'#fff',fontSize:14,fontWeight:700}}>
      <IconHammer size={18}/>Zum Anbieter-Bereich wechseln

/* ── Navigation (dev sidebar) ────────────────────────────────────────────── */

  {g:'Website & Onboarding',items:[{k:'landing',I:IconHammer,n:'Landing / Website'},{k:'onboarding',I:IconHandshake,n:'Onboarding'},{k:'kyc-handwerker',I:IconHammer,n:'KYC Handwerker'},{k:'kyc-nachbarschaft',I:IconHandshake,n:'KYC Nachbarschaft'}]},
  {g:'Kunde',items:[{k:'home',I:IconSearch,n:'Home (Kunde)'},{k:'nachbarschaft',I:IconHandshake,n:'Nachbarschaftshilfe'},{k:'suche',I:IconSearch,n:'Suche & Filter'},{k:'profil',I:IconStar,n:'Handwerker-Profil'},{k:'chat',I:IconMessage,n:'Chat + Angebot'},{k:'vertrag',I:IconDoc,n:'Digitaler Vertrag'},{k:'bewertung',I:IconStar,n:'Bewertung abgeben'}]},
  {g:'Aufträge (Kunde)',items:[{k:'auftraege',I:IconBriefcase,n:'Meine Aufträge'},{k:'nachrichten',I:IconMessage,n:'Nachrichten (Tab)'},{k:'reklamation',I:IconAlert,n:'Reklamation'},{k:'konto',I:IconUser,n:'Profil'},{k:'einstellungen',I:IconSettings,n:'Einstellungen (DSGVO)'}]},
  {g:'Anbieter',items:[{k:'provider-home',I:IconBriefcase,n:'Provider Dashboard'},{k:'provider-kalender',I:IconCalendar,n:'Kalender'},{k:'steuer',I:IconWallet,n:'Steuer / DAC7'},{k:'provider-profil',I:IconEdit,n:'Profil-Editor'}]},
];

function MobileNav({cur,go,onClose}){
  return <div style={{position:'fixed',inset:0,background:'rgba(8,9,10,.96)',zIndex:1000,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
    <div style={{padding:'22px 20px 10px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:'rgba(8,9,10,.96)',zIndex:1}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:30,height:30,background:'linear-gradient(135deg,#1C6B45,#155436)',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}><IconHammer size={16}/></div>
        <span style={{fontSize:16,fontWeight:900,color:'#fff',letterSpacing:2}}>WERKR</span>
        <span style={{fontSize:10,color:'#54585e',marginLeft:4}}>Prototyp</span>
      </div>
      <button onClick={onClose} style={{width:36,height:36,borderRadius:18,background:'#1d1f22',color:'#9aa0a8',display:'flex',alignItems:'center',justifyContent:'center'}}><Svg size={18}><path d="M18 6 6 18M6 6l12 12"/></Svg></button>
    </div>
    <div style={{padding:'8px 16px 40px'}}>
      {NAV.map(sec=><div key={sec.g} style={{marginBottom:20}}>
        <div style={{fontSize:9,fontWeight:800,color:'#4b4f56',letterSpacing:1.2,textTransform:'uppercase',padding:'0 4px 9px'}}>{sec.g}</div>
        {sec.items.map(item=><button key={item.k} onClick={()=>{go(item.k);onClose();}} style={{display:'flex',alignItems:'center',gap:13,width:'100%',padding:'13px 14px',marginBottom:5,borderRadius:13,background:cur===item.k?'#16271f':'#141517',border:cur===item.k?'1px solid #1C6B45':'1px solid #232527',textAlign:'left'}}>
          <span style={{width:22,display:'flex',justifyContent:'center',color:cur===item.k?'#3DBA7D':'#6b7078'}}><item.I size={18}/></span>
          <span style={{fontSize:14,fontWeight:600,color:cur===item.k?'#3DBA7D':'#c4c8cd'}}>{item.n}</span>
          {cur===item.k&&<span style={{marginLeft:'auto',width:7,height:7,borderRadius:'50%',background:'#3DBA7D'}}/>}
        </button>)}
      </div>)}
    </div>
  </div>;
}

function Sidebar({cur,go}){
  return <div id="sidebar">
    <div className="sb-logo">
      <div className="sb-logo-row"><div className="sb-logo-icon"><IconHammer size={17}/></div><span className="sb-logo-text">WERKR</span></div>
      <div className="sb-logo-sub">Interaktiver Prototyp v3</div>
    </div>
    {NAV.map(sec=><div key={sec.g} className="sb-group">
      <div className="sb-label">{sec.g}</div>
      {sec.items.map(item=><div key={item.k} className={`sb-item${cur===item.k?' active':''}`} onClick={()=>go(item.k)}>
        <span className="sb-ic"><item.I size={16}/></span><span className="sb-name">{item.n}</span>
      </div>)}
      <div className="sb-sep"/>
    </div>)}
  </div>;
}

function App(){
  const [screen,setScreen]=useState('landing');
  const [kycT,setKycT]=useState('handwerker');
  const [menuOpen,setMenuOpen]=useState(false);
  const go=s=>{
    if(s==='kyc-handwerker'){setKycT('handwerker');setScreen('kyc');}
    else if(s==='kyc-nachbarschaft'){setKycT('nachbarschaft');setScreen('kyc');}
    else setScreen(s);
    setMenuOpen(false);
    setTimeout(()=>document.querySelector('.screen')?.scrollTo?.(0,0),0);
  };
  const map={landing:<Landing go={go}/>,onboarding:<Onboarding go={go}/>,kyc:<KYC go={go} track={kycT}/>,home:<Home go={go}/>,nachbarschaft:<Nachbarschaft go={go}/>,nachrichten:<NachrichtenList go={go}/>,suche:<Suche go={go}/>,profil:<Profil go={go}/>,chat:<Chat go={go}/>,vertrag:<Vertrag go={go}/>,bewertung:<Bewertung go={go}/>,auftraege:<Auftraege go={go}/>,reklamation:<Reklamation go={go}/>,konto:<Konto go={go}/>,'provider-home':<ProviderHome go={go}/>,'provider-kalender':<ProviderKalender go={go}/>,steuer:<Steuer go={go}/>,'provider-profil':<ProfilEditor go={go}/>,einstellungen:<Einstellungen go={go}/>};
  const cur=screen==='kyc'?(kycT==='handwerker'?'kyc-handwerker':'kyc-nachbarschaft'):screen;
  return <div style={{display:'flex',minHeight:'100vh'}}>
    <Sidebar cur={cur} go={go}/>
    <div id="main"><div className="phone-wrap">
      <div className="phone"><div className="screen">{map[screen]||map.landing}</div></div>
      <div className="hint">← Sidebar: Screen wählen · Buttons im Prototyp klicken zum Navigieren</div>
    </div></div>
    {menuOpen && <MobileNav cur={cur} go={go} onClose={()=>setMenuOpen(false)}/>}
    <button id="mob-btn" onClick={()=>setMenuOpen(true)}><Svg size={17}><path d="M3 12h18M3 6h18M3 18h18"/></Svg><span>Alle Screens</span></button>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
