name: Supabase Keep-Alive

on:
  schedule:
    # Every 3 days at 06:00 UTC — prevents free-tier auto-pause (triggers at 7 days inactivity)
    - cron: '0 6 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" \
            "${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1")
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "401" ] && [ "$STATUS" != "403" ]; then
            echo "Unexpected status $STATUS — project may be paused or unreachable"
            exit 1
          fi
          echo "Project is active."
