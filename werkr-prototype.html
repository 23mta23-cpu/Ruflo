<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WERKR — Interaktiver Prototyp</title>
<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:#0e0f0d;color:#1A1917;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;transition:transform .12s cubic-bezier(.4,0,.2,1),opacity .15s ease,background .18s ease,color .18s ease,box-shadow .2s ease}
button:active{transform:scale(.96)}
input,textarea,select{font-family:inherit;outline:none;transition:border-color .18s ease,box-shadow .18s ease}
svg{display:block}
@keyframes screenIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.screen-anim{animation:screenIn .32s cubic-bezier(.16,1,.3,1)}
.pop{animation:popIn .3s cubic-bezier(.16,1,.3,1)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#d8d7d2;border-radius:3px}
#sidebar{width:256px;min-height:100vh;background:#141517;border-right:1px solid #232527;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
#main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:36px 24px;min-height:100vh}
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;position:sticky;top:36px}
.phone{width:390px;height:800px;background:#F5F4F0;border-radius:48px;overflow:hidden;position:relative;box-shadow:0 0 0 11px #1d1f22,0 0 0 12px #34373b,0 50px 130px rgba(0,0,0,.85);flex-shrink:0}
.screen{height:100%;overflow-y:auto;overflow-x:hidden;position:relative}
.hint{color:#54585e;font-size:11px;letter-spacing:.4px;text-align:center;max-width:300px;line-height:1.5}
.sb-logo{padding:22px 18px 18px;border-bottom:1px solid #232527}
.sb-logo-row{display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#1B5C40,#154F37);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 2px 10px rgba(27,92,64,.40)}
.sb-logo-text{font-size:17px;font-weight:700;color:#fff;letter-spacing:2.5px}
.sb-logo-sub{font-size:10px;color:#5b5f66;margin-top:5px;padding-left:44px;letter-spacing:.3px}
.sb-group{padding:10px 0}
.sb-label{font-size:9px;font-weight:700;color:#4b4f56;letter-spacing:1.4px;text-transform:uppercase;padding:0 18px 7px}
.sb-item{display:flex;align-items:center;gap:11px;padding:9px 18px;cursor:pointer;transition:background .15s;color:#9aa0a8}
.sb-item:hover{background:#1d1f22}
.sb-item.active{background:#162318;border-right:2px solid #1B5C40}
.sb-item.active .sb-name{color:#4DC986;font-weight:600}
.sb-item.active .sb-ic{color:#4DC986}
.sb-ic{width:18px;display:flex;align-items:center;justify-content:center;color:#6b7078}
.sb-name{font-size:12.5px;color:#9aa0a8;font-weight:500}
.sb-sep{height:1px;background:#1d1f22;margin:6px 0}
@media(max-width:760px){#sidebar{display:none}#main{padding:0}.phone{width:100vw;height:100vh;border-radius:0;box-shadow:none}.phone-wrap{gap:0}.hint{display:none}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
#mob-btn{display:none;position:fixed;bottom:76px;right:16px;z-index:1100;background:rgba(20,21,23,.88);backdrop-filter:blur(12px);color:#fff;border-radius:50px;padding:8px 14px;font-size:11px;font-weight:600;align-items:center;gap:6px;box-shadow:0 4px 20px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.14);cursor:pointer}
@media(max-width:760px){#mob-btn{display:flex}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

/* ── Design Tokens ───────────────────────────────────────────────────────── */
const C={
  bg:'#F9F8F5', surf:'#FFFFFF', surface:'#FFFFFF', border:'#E5E1DA', hair:'#F2EFE9',
  ink:'#1A1917', sub:'#6C6862', muted:'#A8A49C',
  primary:'#1B5C40', primaryBg:'#EBF4EF', primaryBd:'#BDD9C9', primaryDk:'#154F37',
  clay:'#9B3E25', clayBg:'#F5E8E3', clayBd:'#E2C0B2',
  green:'#1A7A45', greenBg:'#E4F5EB',
  gold:'#8F6B1A', goldBg:'#F6ECD8', goldBd:'#DDD0A8',
  red:'#B91C1C', redBg:'#FEE2E2', redBd:'#FECACA',
  amber:'#9A7020', amberBg:'#F8F0E0',
};
const sh={
  xs:'0 1px 2px rgba(26,25,23,.04)',
  sm:'0 1px 3px rgba(26,25,23,.06), 0 1px 2px rgba(26,25,23,.03)',
  md:'0 6px 18px rgba(26,25,23,.08), 0 2px 5px rgba(26,25,23,.04)',
  lg:'0 14px 40px rgba(26,25,23,.12)',
};

/* ── SVG Icons (open-lovable style, stroke-based, no emoji) ───────────────── */
function Svg({size=20,fill='none',sw=2,style,children}){
  return <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor"
    strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={style}>{children}</svg>;
}
const IconSearch   =({size})=><Svg size={size}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></Svg>;
const IconBriefcase=({size})=><Svg size={size}><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></Svg>;
const IconMessage  =({size})=><Svg size={size}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></Svg>;
const IconUser     =({size})=><Svg size={size}><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a7 7 0 0 1 14 0v1"/></Svg>;
const IconBack     =({size})=><Svg size={size}><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></Svg>;
const IconChevron  =({size=18})=><Svg size={size}><path d="m9 18 6-6-6-6"/></Svg>;
const IconShield   =({size})=><Svg size={size}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></Svg>;
const IconLock     =({size})=><Svg size={size}><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Svg>;
const IconCheck    =({size})=><Svg size={size}><path d="M20 6 9 17l-5-5"/></Svg>;
const IconSend     =({size})=><Svg size={size} sw={2.2}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></Svg>;
const IconSettings =({size})=><Svg size={size}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></Svg>;
const IconMapPin   =({size=13})=><Svg size={size}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Svg>;
const IconCalendar =({size=13})=><Svg size={size}><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></Svg>;
const IconHeart    =({size,filled})=><Svg size={size} fill={filled?'currentColor':'none'}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"/></Svg>;
const IconHammer   =({size})=><Svg size={size}><path d="m15 12-8.5 8.5a2.12 2.12 0 1 1-3-3L12 9"/><path d="M17.64 15 22 10.64"/><path d="m20.91 11.7-1.25-1.25c-.6-.6-.93-1.4-.93-2.25v-.86L16.01 4.6a5.56 5.56 0 0 0-3.94-1.64H9l.92.82A6.18 6.18 0 0 1 12 8.4v1.56l2 2h.86c.85 0 1.65.33 2.25.93l1.25 1.25"/></Svg>;
const IconHandshake=({size})=><Svg size={size}><path d="m11 17 2 2a1 1 0 1 0 3-3"/><path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-3-3l2.81-2.81a5.79 5.79 0 0 1 7.06-.87l.47.28a2 2 0 0 0 1.42.25L21 4"/><path d="m21 3 1 11h-2"/><path d="M3 3 2 14l6.5 6.5a1 1 0 1 0 3-3"/><path d="M3 4h8"/></Svg>;
const IconPlus     =({size})=><Svg size={size}><path d="M12 5v14M5 12h14"/></Svg>;
const IconRepeat   =({size=13})=><Svg size={size}><path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></Svg>;
const IconAlert    =({size})=><Svg size={size}><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><path d="M12 9v4M12 17h.01"/></Svg>;
const IconDoc      =({size})=><Svg size={size}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></Svg>;
const IconChart    =({size})=><Svg size={size}><path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-3"/></Svg>;
const IconWallet   =({size})=><Svg size={size}><path d="M19 7V5a2 2 0 0 0-2-2H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1H3"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/><path d="M18 12a1 1 0 0 0 0 2h2"/></Svg>;
const IconBell     =({size})=><Svg size={size}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></Svg>;
const IconCard     =({size})=><Svg size={size}><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></Svg>;
const IconCamera   =({size})=><Svg size={size}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3Z"/><circle cx="12" cy="13" r="3"/></Svg>;
const IconUpload   =({size})=><Svg size={size}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8 12 3 7 8M12 3v12"/></Svg>;
const IconArrowR   =({size=16})=><Svg size={size}><path d="M5 12h14M12 5l7 7-7 7"/></Svg>;
const IconLogout   =({size})=><Svg size={size}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></Svg>;
const IconTrash    =({size})=><Svg size={size}><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></Svg>;
const IconEdit     =({size})=><Svg size={size}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></Svg>;
const IconImage    =({size})=><Svg size={size}><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.09-3.09a2 2 0 0 0-2.82 0L6 21"/></Svg>;
const IconClock    =({size=13})=><Svg size={size}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></Svg>;
const IconFile     =({size})=><Svg size={size}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></Svg>;
const IconStar=({size=14,filled})=><Svg size={size} sw={1.5} fill={filled?'currentColor':'none'}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></Svg>;

/* ── Primitives ──────────────────────────────────────────────────────────── */
function Badge({label,v='muted',icon}){
  const bg={primary:C.primaryBg,gold:C.goldBg,green:C.greenBg,red:C.redBg,amber:C.amberBg,muted:C.hair}[v];
  const col={primary:C.primary,gold:C.gold,green:C.green,red:C.red,amber:C.amber,muted:C.sub}[v];
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 9px',borderRadius:7,fontSize:10.5,fontWeight:700,letterSpacing:.1,background:bg,color:col}}>{icon&&<span style={{display:'flex'}}>{icon}</span>}{label}</span>;
}
function Stars({v=5,size=13}){
  return <span style={{display:'inline-flex',gap:1.5,lineHeight:1,color:C.gold}}>
    {[1,2,3,4,5].map(i=><span key={i} style={{color:i<=Math.round(v)?C.gold:'#dcdbd6'}}><IconStar size={size} filled={i<=Math.round(v)}/></span>)}
  </span>;
}
function Bar({val,max,label}){
  const pct=Math.min(100,Math.round(val/max*100));
  const col=pct>85?C.red:pct>70?C.amber:C.primary;
  return <div style={{marginBottom:10}}>
    {label&&<div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,color:C.sub,marginBottom:5}}><span>{label}</span><span style={{fontWeight:700,color:col}}>{val}/{max}</span></div>}
    <div style={{height:7,background:C.hair,borderRadius:5}}><div style={{height:'100%',width:pct+'%',background:col,borderRadius:5,transition:'width .4s'}}/></div>
  </div>;
}
function Hdr({title,back,right,sub}){
  return <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'15px 18px',background:C.surf,borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,zIndex:10}}>
    {back?<button onClick={back} style={{width:34,height:34,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',color:C.ink,background:C.hair}}><IconBack size={18}/></button>:<div style={{width:34}}/>}
    <div style={{textAlign:'center'}}>
      <div style={{fontSize:15.5,fontWeight:600,color:C.ink,letterSpacing:-.2}}>{title}</div>
      {sub&&<div style={{fontSize:10.5,color:C.muted,marginTop:1}}>{sub}</div>}
    </div>
    {right||<div style={{width:34}}/>}
  </div>;
}
function Card({ch,style={},click}){
  return <div onClick={click} style={{background:C.surf,borderRadius:16,boxShadow:sh.sm,padding:15,...style,cursor:click?'pointer':'default'}}>{ch}</div>;
}
function Btn({label,icon,onClick,col=C.primary,tc='#fff',style={}}){
  return <button onClick={onClick} style={{width:'100%',padding:'14px 16px',background:col,borderRadius:13,color:tc,fontSize:14.5,fontWeight:700,letterSpacing:.1,display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:col===C.primary?'0 4px 14px rgba(27,92,64,.28)':'none',...style}}>{icon}{label}</button>;
}
function Avatar({txt,size=46,tone='gold'}){
  const map={gold:[C.goldBg,C.gold],primary:[C.primaryBg,C.primary],ink:[C.ink,'#fff']};
  const [bg,fg]=map[tone];
  return <div style={{width:size,height:size,borderRadius:size/2,background:bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*0.34,fontWeight:600,color:fg,flexShrink:0,letterSpacing:.3}}>{txt}</div>;
}

function CustomerTabBar({cur,go}){
  const tabs=[
    {k:'home',Icon:IconSearch,label:'Entdecken'},
    {k:'auftraege',Icon:IconBriefcase,label:'Aufträge'},
    {k:'nachrichten',Icon:IconMessage,label:'Nachrichten',badge:3},
    {k:'konto',Icon:IconUser,label:'Profil'},
  ];
  return <div style={{display:'flex',borderTop:`1px solid ${C.border}`,background:C.surf,flexShrink:0,paddingBottom:6,boxShadow:'0 -2px 14px rgba(16,18,18,.04)'}}>
    {tabs.map(({k,Icon,label,badge})=>{
      const a=cur===k;
      return <button key={k} onClick={()=>go(k)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'11px 4px 7px',gap:4,position:'relative'}}>
        {a&&<div style={{position:'absolute',top:0,left:'26%',right:'26%',height:2.5,background:C.primary,borderRadius:'0 0 3px 3px'}}/>}
        <div style={{position:'relative',color:a?C.primary:C.muted,transition:'color .15s'}}>
          <Icon size={22}/>
          {badge&&<div style={{position:'absolute',top:-4,right:-7,background:C.red,borderRadius:9,minWidth:15,height:15,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:600,color:'#fff',padding:'0 3px',border:'1.5px solid #fff'}}>{badge}</div>}
        </div>
        <span style={{fontSize:10,fontWeight:a?700:500,color:a?C.ink:C.muted,letterSpacing:.1}}>{label}</span>
      </button>;
    })}
  </div>;
}

/* ── SCREENS ─────────────────────────────────────────────────────────────── */

function Landing({go}){
  return <div style={{height:'100%',overflow:'auto',background:C.bg}}>
    {/* Dark hero */}
    <div style={{background:C.primary,padding:'18px 22px 40px',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:-60,right:-50,width:200,height:200,borderRadius:'50%',background:'radial-gradient(circle,rgba(255,255,255,.12),transparent 70%)'}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',position:'relative',marginBottom:38}}>
        <div style={{display:'flex',alignItems:'center',gap:9}}>
          <div style={{width:32,height:32,background:'linear-gradient(135deg,#1B5C40,#154F37)',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}><IconHammer size={17}/></div>
          <span style={{fontSize:17,fontWeight:700,letterSpacing:2.5,color:'#fff'}}>WERKR</span>
        </div>
        <button onClick={()=>go('login')} style={{padding:'8px 15px',background:'rgba(255,255,255,.1)',borderRadius:9,fontSize:12.5,fontWeight:600,color:'#fff',backdropFilter:'blur(8px)'}}>Einloggen</button>
      </div>
      <div style={{position:'relative'}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:7,background:'rgba(61,186,125,.14)',borderRadius:20,padding:'6px 13px',marginBottom:22}}>
          <div style={{width:6,height:6,background:'#4DC986',borderRadius:'50%',boxShadow:'0 0 8px #4DC986'}}/><span style={{fontSize:11,fontWeight:600,color:'#4DC986'}}>Live in Köln &amp; Umgebung</span>
        </div>
        <div style={{fontSize:33,fontWeight:700,letterSpacing:-1.2,lineHeight:1.1,color:'#fff',marginBottom:14}}>Handwerk &amp;<br/>Nachbarschafts&shy;hilfe — <span style={{color:'#4DC986'}}>fair geregelt.</span></div>
        <div style={{fontSize:13.5,color:'rgba(255,255,255,.6)',lineHeight:1.65,marginBottom:26,maxWidth:300}}>Geprüfte Profis in deiner Nähe. Zahlungen via Stripe&nbsp;Escrow gesichert. Nur <strong style={{color:'#fff'}}>8&nbsp;% Plattformgebühr</strong>.</div>
        <div style={{display:'flex',flexDirection:'column',gap:11,marginBottom:24}}>
          <Btn label="Handwerker finden" icon={<IconSearch size={18}/>} onClick={()=>go('home')}/>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>go('registrierung')} style={{flex:1,padding:'13px',background:'rgba(255,255,255,.08)',borderRadius:13,color:'#fff',fontSize:13.5,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:7,border:'1px solid rgba(255,255,255,.14)'}}><IconUser size={16}/>Registrieren</button>
            <button onClick={()=>go('kyc-handwerker')} style={{flex:1,padding:'13px',background:'rgba(255,255,255,.06)',borderRadius:13,color:'rgba(255,255,255,.8)',fontSize:13.5,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:7,border:'1px solid rgba(255,255,255,.1)'}}><IconHammer size={16}/>Anbieter</button>
          </div>

function KYC({go,track}){
  const [step,setStep]=useState(0);
  const [t,setT]=useState(track||'handwerker');
  const [errs,setErrs]=useState({});
  // Handwerker step 0
  const [vorname,setVorname]=useState('');
  const [nachname,setNachname]=useState('');
  const [adresse,setAdresse]=useState('');
  const [telefon,setTelefon]=useState('');
  const [emailVal,setEmailVal]=useState('');
  // Handwerker step 1
  const [steuerID,setSteuerID]=useState('');
  const [iban,setIban]=useState('');
  // Handwerker step 2
  const [fileUploaded,setFileUploaded]=useState(false);
  const [trade,setTrade]=useState('Sanitär & Heizung');
  // Nachbarschaft step 0
  const [nbVorname,setNbVorname]=useState('');
  const [nbNachname,setNbNachname]=useState('');
  const [plzOrt,setPlzOrt]=useState('');
  const [dob,setDob]=useState('');
  // Nachbarschaft step 1
  const [skills,setSkills]=useState([]);
  const [rate,setRate]=useState('15');

  const calcAge=d=>{const p=d.split('.');if(p.length!==3)return null;const[dd,mm,yy]=p.map(Number);if(!dd||!mm||!yy||yy<1900)return null;const b=new Date(yy,mm-1,dd),n=new Date();let a=n.getFullYear()-b.getFullYear();if(n<new Date(n.getFullYear(),b.getMonth(),b.getDate()))a--;return a;};
  const handleDob=v=>{const d=v.replace(/\D/g,'').slice(0,8);let f=d;if(d.length>2)f=d.slice(0,2)+'.'+d.slice(2);if(d.length>4)f=f.slice(0,5)+'.'+d.slice(4);setDob(f);setErrs(e=>({...e,dob:undefined}));};
  const toggleSkill=s=>setSkills(sk=>sk.includes(s)?sk.filter(x=>x!==s):[...sk,s]);

  const validate=()=>{
    const e={};
    if(t==='handwerker'){
      if(step===0){
        if(!vorname.trim()) e.vorname='Bitte Vornamen eingeben';
        if(!nachname.trim()) e.nachname='Bitte Nachnamen eingeben';
        if(!adresse.trim()) e.adresse='Bitte Adresse eingeben';
        if(!telefon.trim()) e.telefon='Bitte Telefonnummer eingeben';
        else if(!/^\+?[\d\s\-()+]{7,}$/.test(telefon)) e.telefon='Ungültige Telefonnummer';
        if(!emailVal.trim()) e.email='Bitte E-Mail eingeben';
        else if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(emailVal)) e.email='Ungültige E-Mail-Adresse';
      } else if(step===1){
        const sid=steuerID.replace(/\s/g,'');
        if(!sid) e.steuerID='Bitte Steuer-ID eingeben';
        else if(sid.length!==11||!/^\d{11}$/.test(sid)) e.steuerID='Steuer-ID muss genau 11 Ziffern haben';
        const ib=iban.replace(/\s/g,'');
        if(!ib) e.iban='Bitte IBAN eingeben';
        else if(!/^DE\d{20}$/.test(ib)) e.iban='Ungültige IBAN — muss mit DE beginnen und 22 Zeichen lang sein';
      } else if(step===2){
        if(!fileUploaded) e.file='Bitte Gewerbeschein hochladen';
      }
    } else {
      if(step===0){
        if(!nbVorname.trim()) e.nbVorname='Bitte Vornamen eingeben';
        if(!nbNachname.trim()) e.nbNachname='Bitte Nachnamen eingeben';
        if(!plzOrt.trim()) e.plzOrt='Bitte PLZ & Ort eingeben';
        if(!dob.trim()) e.dob='Bitte Geburtsdatum eingeben';
        else{const a=calcAge(dob);if(a===null)e.dob='Ungültiges Datum (Format: TT.MM.JJJJ)';else if(a<18)e.dob=`Mindestalter 18 Jahre (§ JArbSchG) — du bist ${a} Jahre alt`;}
      } else if(step===1){
        if(skills.length===0) e.skills='Bitte mindestens eine Fähigkeit wählen';
      }
    }
    return e;
  };
  const next=()=>{const e=validate();if(Object.keys(e).length){setErrs(e);return;}setErrs({});setStep(s=>s+1);};

  const total=t==='handwerker'?3:2;
  const done=step>=total;
  const inp=(key)=>({width:'100%',padding:'11px 13px',borderRadius:11,border:`1.5px solid ${errs[key]?C.red:C.border}`,fontSize:13,background:C.surf});
  const lbl={fontSize:12,fontWeight:600,color:C.sub,marginBottom:5,display:'block'};
  const ErrMsg=({k})=>errs[k]?<div style={{fontSize:11.5,color:C.red,marginTop:5,padding:'7px 10px',background:C.redBg,borderRadius:8}}>{errs[k]}</div>:null;
  const Field=({label,k,value,onChange,placeholder,type='text',maxLength,extra={}})=><div style={{marginBottom:14}}>
    <label style={lbl}>{label}</label>
    <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} type={type} maxLength={maxLength} style={{...inp(k),...extra}} onFocus={()=>setErrs(e=>({...e,[k]:undefined}))}/>
    <ErrMsg k={k}/>
  </div>;

  return <div style={{height:'100%',overflow:'auto',background:C.bg}}>
    <Hdr title="Registrierung" back={()=>go('onboarding')}/>
    <div style={{padding:'18px 20px'}}>
      <div style={{display:'flex',background:C.surf,borderRadius:12,boxShadow:sh.xs,padding:4,marginBottom:20,gap:4}}>

function ProviderKalender({go}){
  const slots=['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00'];
  const booked=['10:00','11:00'];
  const [blocked,setBlocked]=useState(['12:00','16:00','17:00']);
  const [saved,setSaved]=useState(false);
  const [weekOff,setWeekOff]=useState(0);
  const toggle=s=>setBlocked(b=>b.includes(s)?b.filter(x=>x!==s):[...b,s]);
  const base=new Date('2026-06-09');
  const startDate=new Date(base.getTime()+weekOff*7*86400000);
  const endDate=new Date(startDate.getTime()+6*86400000);
  const fmt=d=>d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
  const weekLabel=`Mo, ${fmt(startDate)}–So, ${fmt(endDate)}`;
  return <div style={{height:'100%',overflow:'auto',background:C.bg}}>
    <Hdr title="Verfügbarkeit" back={()=>go('provider-home')}/>
    <div style={{padding:'12px 20px',background:C.amberBg}}>
      <div style={{fontSize:11.5,color:C.amber,fontWeight:600,display:'flex',alignItems:'center',gap:7}}><IconAlert size={15}/>Letztes Update vor 8 Tagen — bitte aktualisieren</div>
    </div>
    <div style={{padding:'16px 20px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <span style={{fontSize:13.5,fontWeight:700}}>{weekLabel}</span>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>{setWeekOff(w=>w-1);setSaved(false);}} style={{width:30,height:30,borderRadius:9,background:C.surf,boxShadow:sh.xs,display:'flex',alignItems:'center',justifyContent:'center',color:C.sub}}><IconBack size={15}/></button>
          <button onClick={()=>{setWeekOff(w=>w+1);setSaved(false);}} style={{width:30,height:30,borderRadius:9,background:C.surf,boxShadow:sh.xs,display:'flex',alignItems:'center',justifyContent:'center',color:C.sub}}><IconChevron size={15}/></button>
        </div>
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:18}}>
        {slots.map(s=>{const b=booked.includes(s),bl=blocked.includes(s);return <button key={s} onClick={()=>!b&&toggle(s)} style={{padding:'10px 12px',borderRadius:11,background:b?C.amberBg:bl?C.surf:C.primaryBg,boxShadow:bl?sh.xs:'none',color:b?C.amber:bl?C.muted:C.primary,fontSize:11.5,fontWeight:700,cursor:b?'default':'pointer',minWidth:74,textAlign:'center'}}>
          {s}<br/><span style={{fontSize:9,fontWeight:600,display:'inline-flex',alignItems:'center',gap:3,marginTop:2}}>{b?<><IconCalendar size={10}/>Gebucht</>:bl?<><IconLock size={10}/>Gesperrt</>:<><IconCheck size={10}/>Frei</>}</span>
        </button>;})}
      </div>
      <div style={{display:'flex',gap:9,marginBottom:14}}>
        <button onClick={()=>setBlocked(slots.filter(s=>!booked.includes(s)))} style={{flex:1,padding:11,borderRadius:11,background:C.surf,boxShadow:sh.xs,fontSize:11.5,fontWeight:600,color:C.sub}}>Woche sperren</button>
        <button onClick={()=>{setBlocked([]);setSaved(false);}} style={{flex:1,padding:11,borderRadius:11,background:C.primaryBg,fontSize:11.5,fontWeight:600,color:C.primary}}>Freigeben</button>
      </div>
      {saved?<div style={{padding:12,background:C.primaryBg,borderRadius:11,textAlign:'center',fontSize:12.5,color:C.primary,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}><IconCheck size={15}/>Gespeichert!</div>
        :<Btn label="Änderungen speichern" onClick={()=>setSaved(true)}/>}
    </div>
  </div>;
}

function Registrierung({go}){
  const [step,setStep]=useState(1);
  const [loading,setLoading]=useState(false);
  const [done,setDone]=useState(false);
  const [f,setF]=useState({email:'',pw:'',pwc:'',vorname:'',nachname:'',phone:'',accountType:'private',companyName:'',ustId:'',plz:'',stadt:'',dsgvo:false,news:false});
  const patch=(k,v)=>setF(p=>({...p,[k]:v}));
  const [showPw,setShowPw]=useState(false);
  const validate=()=>{
    if(step===1){if(!f.email.trim()||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email))return 'Bitte gültige E-Mail-Adresse eingeben.';if(f.pw.length<8)return 'Passwort muss mindestens 8 Zeichen haben.';if(f.pw!==f.pwc)return 'Passwörter stimmen nicht überein.';}
    if(step===2){if(!f.vorname.trim())return 'Bitte Vornamen eingeben.';if(!f.nachname.trim())return 'Bitte Nachnamen eingeben.';if(f.phone.replace(/\s/g,'').length<9)return 'Bitte gültige Telefonnummer eingeben.';}
    if(step===3){if(!f.plz.trim()||f.plz.length<5)return 'Bitte gültige PLZ eingeben.';if(!f.stadt.trim())return 'Bitte Stadt eingeben.';if(!f.dsgvo)return 'Bitte stimmen Sie der Datenschutzerklärung zu.';}
    return null;
  };
  const goNext=()=>{const err=validate();if(err){alert(err);return;}if(step<3)setStep(s=>s+1);else{setLoading(true);setTimeout(()=>{setLoading(false);setDone(true);},1200);}};
  const pwS=pw=>pw.length<8?0:pw.length<12||!/[^a-zA-Z0-9]/.test(pw)?1:2;
  const SField=(lbl,key,ph,type='text',hint)=><div style={{marginBottom:18}}>
    <div style={{fontSize:13,fontWeight:600,color:C.sub,marginBottom:6}}>{lbl}</div>
    <div style={{position:'relative',background:'#fff',border:`1px solid ${C.border}`,borderRadius:12,boxShadow:sh.xs}}>
      <input type={type==='password'&&showPw?'text':type} value={f[key]} onChange={e=>patch(key,e.target.value)} placeholder={ph} style={{width:'100%',fontSize:14.5,color:C.ink,padding:'13px 14px',background:'transparent'}}/>
      {type==='password'&&<button onClick={()=>setShowPw(v=>!v)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',color:C.sub,fontSize:13,background:'none'}}>{showPw?'🙈':'👁'}</button>}
    </div>
    {hint&&<div style={{fontSize:11,color:C.muted,marginTop:5}}>{hint}</div>}
  </div>;
  if(done) return <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,gap:16,background:C.bg}}>
    <div style={{width:80,height:80,borderRadius:40,background:C.greenBg,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:C.green,fontSize:36}}>✓</span></div>
    <div style={{fontSize:22,fontWeight:600,textAlign:'center',color:C.ink}}>Konto erstellt!</div>
    <div style={{fontSize:14,color:C.sub,textAlign:'center',lineHeight:1.6}}>Herzlich willkommen bei WERKR, {f.vorname||'Max'}! Bitte bestätigen Sie Ihre E-Mail.</div>
    <Btn label="E-Mail bestätigen" onClick={()=>go('email-bestaetigung')} style={{marginTop:8}}/>
  </div>;
  return <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg}}>
    <div style={{display:'flex',alignItems:'center',padding:'12px 16px 14px',background:C.bg}}>
      <button onClick={()=>step>1?setStep(s=>s-1):go('landing')} style={{width:36,color:C.ink}}><IconBack size={22}/></button>
      <div style={{flex:1,textAlign:'center'}}><div style={{fontSize:16,fontWeight:700,color:C.ink}}>Konto erstellen</div><div style={{fontSize:11,color:C.sub,marginTop:1}}>Schritt {step}/3 · {['Zugangsdaten','Persönliche Daten','Ihr Standort'][step-1]}</div></div>
      <div style={{width:36}}/>
    </div>
    <div style={{display:'flex',gap:6,padding:'0 16px 16px'}}>{[1,2,3].map(i=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=step?C.ink:C.border}}/>)}</div>
    <div style={{flex:1,overflow:'auto',padding:'4px 20px 20px'}}>
      {step===1&&<div>
        <div style={{fontSize:21,fontWeight:600,color:C.ink,marginBottom:6}}>Zugangsdaten</div>
        <div style={{fontSize:14,color:C.sub,marginBottom:22,lineHeight:1.5}}>Mit diesen Daten melden Sie sich bei WERKR an.</div>
        {SField('E-Mail-Adresse','email','name@beispiel.de','email')}
        {SField('Passwort','pw','Min. 8 Zeichen','password','Mindestens 8 Zeichen, am besten mit Zahlen und Sonderzeichen.')}
        {f.pw.length>0&&<div style={{display:'flex',alignItems:'center',gap:6,marginTop:-8,marginBottom:16}}>
          {[0,1,2].map(i=>{const s=pwS(f.pw);const cols=[C.red,C.amber,C.green];return <div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=s?cols[s]:C.border}}/>;})}
          <span style={{fontSize:11,color:C.sub,minWidth:44}}>{['Zu kurz','Mittel','Stark'][pwS(f.pw)]}</span>
        </div>}
        {SField('Passwort bestätigen','pwc','Passwort wiederholen','password')}
      </div>}
      {step===2&&<div>
        <div style={{fontSize:21,fontWeight:600,color:C.ink,marginBottom:6}}>Persönliche Daten</div>
        <div style={{fontSize:14,color:C.sub,marginBottom:22,lineHeight:1.5}}>Ihr Name erscheint auf Auftragsbestätigungen und Bewertungen.</div>
        <div style={{display:'flex',gap:12}}><div style={{flex:1}}>{SField('Vorname','vorname','Max')}</div><div style={{flex:1}}>{SField('Nachname','nachname','Mustermann')}</div></div>
        <div style={{marginBottom:18}}>
          <div style={{fontSize:13,fontWeight:600,color:C.sub,marginBottom:6}}>Telefonnummer</div>
          <div style={{display:'flex',background:'#fff',border:`1px solid ${C.border}`,borderRadius:12,boxShadow:sh.xs,overflow:'hidden'}}>
            <div style={{padding:'13px 14px',borderRight:`1px solid ${C.border}`,fontSize:14.5,color:C.sub,fontWeight:500,flexShrink:0}}>+49</div>
            <input value={f.phone} onChange={e=>patch('phone',e.target.value)} placeholder="151 1234 5678" style={{flex:1,fontSize:14.5,color:C.ink,padding:'13px 14px',background:'transparent'}}/>
          </div>
          <div style={{fontSize:11,color:C.muted,marginTop:5}}>Wird für Terminbestätigungen und Sicherheit verwendet.</div>
        </div>
        <div style={{display:'flex',gap:8,background:C.bgWarm,border:`1px solid ${C.border}`,borderRadius:10,padding:12,alignItems:'flex-start',marginTop:4}}><span style={{color:C.primary,flexShrink:0}}><IconShield size={14}/></span><span style={{fontSize:12,color:C.sub,lineHeight:1.55}}>Ihre Telefonnummer wird nicht öffentlich angezeigt und nur zur Verifizierung verwendet.</span></div>
        <div style={{marginTop:18}}>
          <div style={{fontSize:13,fontWeight:600,color:C.sub,marginBottom:8}}>Kontotyp</div>
          <div style={{display:'flex',gap:8,marginBottom:f.accountType==='business'?16:0}}>
            {[['private','Privatperson'],['business','Unternehmen']].map(([v,lbl])=><button key={v} onClick={()=>patch('accountType',v)} style={{flex:1,padding:'9px 12px',border:`1.5px solid ${f.accountType===v?C.primary:C.border}`,borderRadius:8,background:f.accountType===v?C.primaryBg:'transparent',fontSize:13,fontWeight:600,color:f.accountType===v?C.primary:C.sub,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>{f.accountType===v&&<IconCheck size={13}/>}{lbl}</button>)}
          </div>
          {f.accountType==='business'&&<div>
            {SField('Firmenname','companyName','Mustermann GmbH')}
            {SField('USt-IdNr. (optional)','ustId','DE123456789','text','Für Reverse-Charge (§13b UStG). Format: DE + 9 Ziffern.')}
          </div>}
        </div>
      </div>}
      {step===3&&<div>
        <div style={{fontSize:21,fontWeight:600,color:C.ink,marginBottom:6}}>Ihr Standort</div>
        <div style={{fontSize:14,color:C.sub,marginBottom:22,lineHeight:1.5}}>Damit zeigen wir Ihnen Handwerker in Ihrer Nähe.</div>
        <div style={{display:'flex',gap:12}}><div style={{flex:0.42}}>{SField('PLZ','plz','12345','numeric')}</div><div style={{flex:0.58}}>{SField('Stadt','stadt','Berlin')}</div></div>
        <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:.6,marginBottom:10,marginTop:6}}>Einwilligungen</div>
        {[['dsgvo',<>Ich stimme den <span style={{textDecoration:'underline',fontWeight:600,color:C.ink,cursor:'pointer'}} onClick={()=>go('agb')}>AGB</span> und der <span style={{textDecoration:'underline',fontWeight:600,color:C.ink,cursor:'pointer'}} onClick={()=>go('datenschutz')}>Datenschutzerklärung</span> zu. <span style={{color:C.red,fontWeight:700}}>*</span></>],['news','Ich möchte Neuigkeiten und Angebote von WERKR per E-Mail erhalten. (Optional)']].map(([k,lbl])=><div key={k} onClick={()=>patch(k,!f[k])} style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:14,cursor:'pointer'}}>
          <div style={{width:20,height:20,borderRadius:5,border:`1.5px solid ${f[k]?C.ink:C.border}`,background:f[k]?C.ink:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>{f[k]&&<IconCheck size={12} color="#fff"/>}</div>
          <span style={{fontSize:13,color:C.sub,lineHeight:1.5}}>{lbl}</span>
        </div>)}
        <div style={{display:'flex',gap:8,background:'#fff',border:`1px solid ${C.primaryBd}`,borderRadius:12,padding:12,alignItems:'flex-start'}}><span style={{color:C.green,flexShrink:0}}><IconShield size={15}/></span><span style={{fontSize:12,color:C.green,lineHeight:1.55}}>DSGVO-konform · Keine Weitergabe an Dritte · Jederzeit widerrufbar</span></div>
      </div>}

    <div style={{padding:'13px 20px 18px',borderTop:`1px solid ${C.border}`,background:C.bg,display:'flex',flexDirection:'column',gap:12}}>
      <button onClick={goNext} disabled={loading} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:C.ink,borderRadius:12,padding:'14px',fontSize:14.5,fontWeight:600,color:'#fff',opacity:loading?.6:1}}>

        <div style={{padding:'12px 14px',background:C.hair,fontSize:10,fontWeight:700,color:C.muted,letterSpacing:1,textTransform:'uppercase'}}>Rückerstattungsregel</div>
        {tiers.map((t,i,a)=><div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 14px',borderBottom:i<a.length-1?`1px solid ${C.hair}`:'none'}}>
          <div style={{width:38,height:38,borderRadius:11,background:t.ok?C.primaryBg:C.redBg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><span style={{fontSize:13,fontWeight:600,color:t.ok?C.primary:C.red}}>{t.ref}</span></div>
          <div style={{flex:1}}><div style={{fontSize:12.5,fontWeight:600,color:C.ink}}>{t.l}</div><div style={{fontSize:11,color:C.muted}}>Rückerstattung: {t.ref} · Gebühr: {t.fee}</div></div>
          {t.ok&&<Badge label="Ihr Fall" v="primary"/>}
        </div>)}
      </div>
      <div style={{background:C.primaryBg,borderRadius:12,padding:'11px 14px',marginBottom:16,fontSize:12,color:C.primaryDk,lineHeight:1.55}}><span style={{fontWeight:700}}>Ihr Fall:</span> > 48 h vor Termin → <span style={{fontWeight:700}}>100 % Rückerstattung (€247,99)</span></div>
      <div style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>Stornierungsgrund (Pflichtfeld)</div>
      <div style={{background:C.surf,borderRadius:14,boxShadow:sh.sm,overflow:'hidden',marginBottom:20}}>
        {reasons.map((r,i,a)=><button key={r} onClick={()=>setReason(r)} style={{display:'flex',alignItems:'center',gap:11,width:'100%',padding:'13px 14px',borderBottom:i<a.length-1?`1px solid ${C.hair}`:'none',textAlign:'left',background:reason===r?C.primaryBg:'transparent'}}>
          <div style={{width:18,height:18,borderRadius:9,border:`2px solid ${reason===r?C.primary:C.border}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{reason===r&&<div style={{width:8,height:8,borderRadius:4,background:C.primary}}/>}</div>
          <span style={{fontSize:13,color:reason===r?C.ink:C.sub,fontWeight:reason===r?600:400}}>{r}</span>
        </button>)}
      </div>
      <Btn label="Stornierung bestätigen" onClick={()=>reason&&setDone(true)} col={reason?C.red:C.border} tc={reason?'#fff':C.muted} style={{boxShadow:reason?'0 4px 12px rgba(193,43,43,.2)':'none'}}/>
    </div>
  </div>;
}

function App(){
  const [screen,setScreen]=useState('landing');
  const [kycT,setKycT]=useState('handwerker');
  const [menuOpen,setMenuOpen]=useState(false);
  const scrollPos=React.useRef({});
  const go=s=>{
    // Save scroll position of the screen we're leaving
    const el=document.querySelector('.screen');
    if(el)scrollPos.current[screen]=el.scrollTop;
    // Navigate
    if(s==='kyc-handwerker'){setKycT('handwerker');setScreen('kyc');}
    else if(s==='kyc-nachbarschaft'){setKycT('nachbarschaft');setScreen('kyc');}
    else setScreen(s);
    setMenuOpen(false);
    // Restore saved scroll position (0 for first visit)
    const destKey=s==='kyc-handwerker'||s==='kyc-nachbarschaft'?'kyc':s;
    setTimeout(()=>{
      const el2=document.querySelector('.screen');
      if(el2)el2.scrollTop=scrollPos.current[destKey]??0;
    },0);
  };
  const map={
    landing:<Landing go={go}/>,login:<Login go={go}/>,'passwort-vergessen':<PasswortVergessen go={go}/>,
    registrierung:<Registrierung go={go}/>,'email-bestaetigung':<EmailBestaetigung go={go}/>,
    onboarding:<Onboarding go={go}/>,kyc:<KYC go={go} track={kycT}/>,
    'bewerbung-eingegangen':<BewerbungEingegangen go={go}/>,'bewerbung-abgelehnt':<BewerbungAbgelehnt go={go}/>,
    home:<Home go={go}/>,nachbarschaft:<Nachbarschaft go={go}/>,'nachbarschaft-profil':<NachbarschaftProfil go={go}/>,nachrichten:<NachrichtenList go={go}/>,
    suche:<Suche go={go}/>,anbieter:<Anbieter go={go}/>,'meine-anbieter':<MeineAnbieter go={go}/>,
    'auftrag-aufgeben':<AuftragAufgeben go={go}/>,profil:<Profil go={go}/>,
    chat:<Chat go={go}/>,angebot:<AngebotAnnehmen go={go}/>,vertrag:<Vertrag go={go}/>,bewertung:<Bewertung go={go}/>,
    auftraege:<Auftraege go={go}/>,'auftrag-detail':<AuftragDetail go={go}/>,'auftrag-abschliessen':<AuftragAbschliessen go={go}/>,zahlung:<Zahlung go={go}/>,
    angebote:<Angebote go={go}/>,stornierung:<Stornierung go={go}/>,
    reklamation:<Reklamation go={go}/>,konto:<Konto go={go}/>,zahlungsmethoden:<Zahlungsmethoden go={go}/>,
    'werkr-garantie':<WerkrGarantie go={go}/>,'instant-preise':<InstantPreise go={go}/>,benachrichtigungen:<Benachrichtigungen go={go}/>,
    'support-chat':<SupportChat go={go}/>,
    'provider-home':<ProviderHome go={go}/>,'provider-auftraege':<ProviderAuftraege go={go}/>,'angebot-erstellen':<AngebotErstellen go={go}/>,
    'provider-kalender':<ProviderKalender go={go}/>,'werkr-pro':<WerkrPro go={go}/>,
    'onboarding-stripe':<OnboardingStripe go={go}/>,rechnung:<Rechnung go={go}/>,
    steuer:<Steuer go={go}/>,'provider-profil':<ProfilEditor go={go}/>,'provider-einstellungen':<ProviderEinstellungen go={go}/>,einstellungen:<Einstellungen go={go}/>,
    agb:<AGB go={go}/>,datenschutz:<Datenschutz go={go}/>,impressum:<Impressum go={go}/>,widerruf:<Widerruf go={go}/>,
  };
  const cur=screen==='kyc'?(kycT==='handwerker'?'kyc-handwerker':'kyc-nachbarschaft'):screen;
  return <div style={{display:'flex',minHeight:'100vh'}}>
    <Sidebar cur={cur} go={go}/>
    <div id="main"><div className="phone-wrap">
      <div className="phone"><div className="screen"><div key={screen} className="screen-anim" style={{height:'100%'}}>{map[screen]||map.landing}</div></div></div>
      <div className="hint">← Sidebar: Screen wählen · Buttons im Prototyp klicken zum Navigieren</div>
    </div></div>
    {menuOpen && <MobileNav cur={cur} go={go} onClose={()=>setMenuOpen(false)}/>}
    <button id="mob-btn" onClick={()=>setMenuOpen(true)}><Svg size={14}><path d="M3 12h18M3 6h18M3 18h18"/></Svg><span>Screens</span></button>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
