[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

# stripe-webhook does not carry a Supabase JWT — authentication is handled
# by verifying the Stripe-Signature header against STRIPE_WEBHOOK_SECRET.
[functions.stripe-webhook]
verify_jwt = false

# waitlist-doi is called from the anonymous landing page (signup) and from
# email confirm links (GET) — no JWT available. Abuse is limited by per-IP
# and per-email rate limits inside the function.
[functions.waitlist-doi]
verify_jwt = false

# verify-email confirm links are clicked from the user's mail client (GET)
# without any JWT; POST does its own JWT check in code. Abuse is limited by
# per-user/per-IP rate limits inside the function.
[functions.verify-email]
verify_jwt = false

# Alle übrigen Functions explizit registrieren — die GitHub-Integration
# deployt zuverlässig nur, was in config.toml deklariert ist. Diese
# Endpoints prüfen das User-JWT zusätzlich im eigenen Code.
[functions.create-payment-intent]
verify_jwt = true

[functions.release-escrow]
verify_jwt = true

[functions.cancel-contract]
verify_jwt = true

[functions.delete-account]
verify_jwt = true

[functions.send-push]
verify_jwt = true

[functions.pstg-annual-report]
verify_jwt = true

[functions.list-payment-methods]
verify_jwt = true
