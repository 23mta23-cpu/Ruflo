name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Expo web export
        run: npx expo export --platform web
        env:
          NODE_ENV: production
          EXPO_BASE_URL: /Ruflo
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || '' }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY || '' }}

      - name: Copy 404 fallback for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Add interactive prototype as /demo
        run: |
          if [ -f werkr-prototype.html ]; then
            mkdir -p dist/demo
            cp werkr-prototype.html dist/demo/index.html
          fi

      - name: Add static pages (privacy policy, SEO cost guide)
        run: |
          [ -f datenschutz.html ] && cp datenschutz.html dist/datenschutz.html
          [ -f kosten.html ] && cp kosten.html dist/kosten.html
          true

      # Root Cause 03.07.2026: Die Pages-Quelle stand auf "Branch main /(root)".
      # Dadurch lieferte GitHub bei jedem Push den ROHEN Repo-Inhalt aus (Jekyll)
      # und raste gegen unser Actions-Artefakt — mal gewann die App, mal die alte
      # Weiterleitung, zuletzt ein 404. Dieser Step stellt die Quelle per API fest
      # auf "GitHub Actions" (build_type: workflow) und beendet den Race dauerhaft.
      - name: Force Pages source to GitHub Actions
        run: |
          curl -sf -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}' \
            && echo "Pages source auf GitHub Actions gestellt" \
            || echo "WARNUNG: Pages-Quelle konnte nicht umgestellt werden — bitte manuell: Settings → Pages → Source: GitHub Actions"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
