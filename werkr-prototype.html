<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WERKR – Die Handwerker-Plattform</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #e8e7e3; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px 0; }
    #root { width: 100%; display: flex; justify-content: center; }
    .phone-frame { width: 400px; min-height: 800px; background: #f8f7f3; border-radius: 32px; box-shadow: 0 24px 64px rgba(0,0,0,0.18); overflow: hidden; position: relative; }
    .screen { min-height: 800px; display: flex; flex-direction: column; }
    .card { background: #ffffff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); border: 1px solid #e8e7e3; }
    .btn-primary { background: #0f0f0f; color: #fff; border: none; border-radius: 10px; padding: 14px 24px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
    .btn-primary:hover { background: #2a2a2a; }
    .btn-secondary { background: #fff; color: #0f0f0f; border: 1.5px solid #e8e7e3; border-radius: 10px; padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-green { background: #2d8f5b; color: #fff; border: none; border-radius: 10px; padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-red-outline { background: #fff; color: #dc2626; border: 1.5px solid #dc2626; border-radius: 10px; padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .chip { background: #f8f7f3; border: 1.5px solid #e8e7e3; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 500; cursor: pointer; color: #0f0f0f; }
    .chip.active { background: #0f0f0f; color: #fff; border-color: #0f0f0f; }
    .badge-green { background: #dcfce7; color: #2d8f5b; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; display: inline-block; }
    .badge-amber { background: #fef3c7; color: #d97706; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; display: inline-block; }
    .badge-blue { background: #dbeafe; color: #1d4ed8; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; display: inline-block; }
    .tab-bar { display: flex; background: #fff; border-top: 1px solid #e8e7e3; }
    .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 4px 8px; cursor: pointer; font-size: 11px; color: #888; gap: 3px; }
    .tab-item.active { color: #0f0f0f; font-weight: 600; }
    input, textarea, select { border: 1.5px solid #e8e7e3; border-radius: 10px; padding: 12px; font-size: 14px; font-family: system-ui; background: #fff; width: 100%; color: #0f0f0f; outline: none; }
    input:focus, textarea:focus, select:focus { border-color: #0f0f0f; }
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: #0f0f0f; color: #fff; padding: 12px 24px; border-radius: 20px; font-size: 14px; font-weight: 500; z-index: 9999; pointer-events: none; transition: opacity 0.4s; white-space: nowrap; }
    .avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: #fff; flex-shrink: 0; }
    .star { font-size: 16px; cursor: pointer; }
    .demo-badge { position: absolute; top: 12px; right: 16px; background: #c9a84c; color: #fff; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; z-index: 100; letter-spacing: 0.5px; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #e8e7e3; border-radius: 4px; }
  </style>
</head>

<div id="root"></div>

  { id: 2, name: "Sara Bauer",  trade: "Elektrikerin",        rating: 4.9, reviews: 63, rate: 72, available: true, color: "#1d4ed8", bio: "Meisterbetrieb mit Fokus auf Privathaushalte. Schnell, sauber, transparent.", services: [{ name: "Steckdose einbauen", price: 59 }, { name: "Sicherungskasten prüfen", price: 99 }] },

];

const NEIGHBORS = [
  { id: 1, name: "Anna K.",   skills: ["Gartenarbeit", "Umzug"],         rating: 4.7, distance: "0.3 km", color: "#2d8f5b" },
  { id: 2, name: "Mehmet D.", skills: ["Reinigung", "Malarbeiten"],       rating: 4.5, distance: "0.7 km", color: "#d97706" },
  { id: 3, name: "Lisa P.",   skills: ["Einkaufen", "Hunde sitter"],      rating: 4.9, distance: "1.1 km", color: "#7c3aed" },
];

// ─── Inline SVG Icons ────────────────────────────────────────────────────────

  </svg>
);
const IconBack = () => (

  </svg>

const IconEuro = () => (

    <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
  </svg>

const IconUser = () => (
  <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
    <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
  </svg>
);
const IconList = () => (
  <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
    <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>

  </svg>

const IconHome = () => (
  <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
    <path d="M3 9.5 12 3l9 6.5V21H3z"/><rect x="9" y="14" width="6" height="7"/>

);
const IconMapPin = () => (

    <circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.4 7 13 8 13s8-7.6 8-13a8 8 0 0 0-8-8z"/>
  </svg>
);
const IconSend = () => (
  <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
    <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/>
  </svg>
);
const IconCircleCheck = () => (
  <svg width="64" height="64" fill="none" stroke="#2d8f5b" strokeWidth="2" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10"/><polyline points="8,12 11,15 16,9"/>
  </svg>
);

// ─── Toast Component ─────────────────────────────────────────────────────────
function Toast({ message, visible }) {
  if (!message) return null;
  return (
    <div className="toast" style={{ opacity: visible ? 1 : 0 }}>{message}</div>
  );
}

// ─── Star Rating Display ──────────────────────────────────────────────────────
function Stars({ rating }) {
  return (
    <span style={{ display: "inline-flex", gap: 1 }}>
      {[1,2,3,4,5].map(i => <IconStar key={i} filled={i <= Math.round(rating)} />)}
    </span>
  );
}

// ─── Provider Card ────────────────────────────────────────────────────────────
function ProviderCard({ provider, onProfile, onRequest }) {
  return (
    <div className="card" style={{ padding: 16, marginBottom: 12 }}>
      <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
        <div className="avatar" style={{ background: provider.color }}>
          {provider.name.split(" ").map(w => w[0]).join("")}
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontWeight: 700, fontSize: 15 }}>{provider.name}</span>
            {provider.available
              ? <span className="badge-green">Verfügbar</span>
              : <span className="badge-amber">Beschäftigt</span>}
          </div>
          <div style={{ color: "#888", fontSize: 13, marginTop: 2 }}>{provider.trade}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 6 }}>
            <Stars rating={provider.rating} />
            <span style={{ fontSize: 12, color: "#888" }}>{provider.rating} ({provider.reviews})</span>
            <span style={{ marginLeft: "auto", fontWeight: 700, fontSize: 15 }}>€{provider.rate}/h</span>
          </div>
        </div>
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
        <button className="btn-secondary" style={{ flex: 1, fontSize: 13 }} onClick={() => onProfile(provider)}>Profil ansehen</button>
        <button className="btn-primary" style={{ flex: 1, fontSize: 13 }} onClick={() => onRequest(provider)}>Anfrage senden</button>
      </div>
    </div>
  );
}

// ─── 1. LandingScreen ────────────────────────────────────────────────────────
function LandingScreen({ navigate }) {
  return (
    <div className="screen" style={{ background: "#f8f7f3", padding: 32, justifyContent: "center" }}>
      <div style={{ textAlign: "center", marginBottom: 48 }}>
        <div style={{ fontSize: 48, fontWeight: 900, letterSpacing: -2, color: "#0f0f0f", lineHeight: 1 }}>WERKR</div>
        <div style={{ color: "#888", fontSize: 15, marginTop: 10, lineHeight: 1.6 }}>
          Die Handwerker-Plattform<br />für Deutschland
        </div>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 44 }}>
        <button className="btn-primary" style={{ fontSize: 16, padding: "16px 24px" }} onClick={() => navigate("CustomerHomeScreen")}>
          Als Kunde starten
        </button>
        <button className="btn-secondary" style={{ fontSize: 16, padding: "16px 24px" }} onClick={() => navigate("ProviderDashScreen")}>
          Als Anbieter
        </button>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        {[
          { icon: <IconShield />, title: "Geprüfte Handwerker",  desc: "Alle Anbieter sind verifiziert und bewertet" },
          { icon: <IconBolt />,   title: "Sicherer Auftrag",     desc: "Zahlung erst nach Auftragsabschluss" },
          { icon: <IconEuro />,   title: "Faire Preise",         desc: "Transparente Preise ohne versteckte Kosten" },
        ].map((vp, i) => (
          <div key={i} className="card" style={{ padding: "14px 16px", display: "flex", gap: 14, alignItems: "center" }}>
            <div style={{ width: 36, height: 36, background: "#f8f7f3", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              {vp.icon}
            </div>
            <div>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{vp.title}</div>
              <div style={{ color: "#888", fontSize: 12, marginTop: 2 }}>{vp.desc}</div>
            </div>
          </div>
        ))}
      </div>
    </div>

}

// ─── 2. CustomerHomeScreen ────────────────────────────────────────────────────
function CustomerHomeScreen({ navigate, showToast }) {
  const [tab, setTab] = useState("suche");
  const [searchText, setSearchText] = useState("");
  const [activeChip, setActiveChip] = useState(null);
  const CHIPS = ["Heizung", "Elektrik", "Sanitär", "Garten", "Umzug", "Reinigung", "Nachbarschaft"];

  const handleChip = (chip) => {
    if (chip === "Nachbarschaft") { navigate("NachbarschaftScreen"); return; }
    setActiveChip(chip === activeChip ? null : chip);
  };

  const ORDERS = [
    { id: 1, title: "Heizungswartung",    provider: "Klaus Müller", date: "Morgen, 10:00", status: "Bestätigt" },
    { id: 2, title: "Steckdose einbauen", provider: "Sara Bauer",   date: "17.06.2026",    status: "Ausstehend" },
  ];

  return (
    <div className="screen" style={{ background: "#f8f7f3" }}>
      <div style={{ flex: 1, overflow: "auto", paddingBottom: 70 }}>

        {tab === "suche" && (
          <div style={{ padding: 20 }}>
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontWeight: 800, fontSize: 22, color: "#0f0f0f" }}>Guten Tag! 👋</div>
              <div style={{ color: "#888", fontSize: 14, marginTop: 2 }}>Was können wir für Sie tun?</div>
            </div>
            <div style={{ position: "relative", marginBottom: 16 }}>
              <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: "#888" }}>
                <IconSearch />
              </span>
              <input value={searchText} onChange={e => setSearchText(e.target.value)} placeholder="Was suchen Sie?" style={{ paddingLeft: 40 }} />
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 20 }}>
              {CHIPS.map(chip => (
                <button key={chip} className={`chip${activeChip === chip ? " active" : ""}`} onClick={() => handleChip(chip)}>{chip}</button>
              ))}
            </div>
            <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 12 }}>Handwerker in Ihrer Nähe</div>
            {PROVIDERS.map(p => (
              <ProviderCard key={p.id} provider={p}
                onProfile={() => navigate("ProviderProfileScreen", { provider: p })}
                onRequest={() => navigate("ProviderProfileScreen", { provider: p })}
              />
            ))}
          </div>
        )}

        {tab === "auftraege" && (
          <div style={{ padding: 20 }}>
            <div style={{ fontWeight: 800, fontSize: 22, marginBottom: 16 }}>Meine Aufträge</div>
            {ORDERS.map(o => (
              <div key={o.id} className="card" style={{ padding: 16, marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>{o.title}</div>
                    <div style={{ color: "#888", fontSize: 13, marginTop: 3 }}>{o.provider}</div>
                    <div style={{ color: "#888", fontSize: 12, marginTop: 3, display: "flex", alignItems: "center", gap: 4 }}>
                      <IconCalendar />{o.date}
                    </div>
                  </div>
                  <span className={o.status === "Bestätigt" ? "badge-green" : "badge-amber"}>{o.status}</span>
                </div>
              </div>
            ))}
          </div>
        )}

        {tab === "konto" && (
          <div style={{ padding: 20 }}>
            <div style={{ fontWeight: 800, fontSize: 22, marginBottom: 16 }}>Mein Konto</div>
            <div className="card" style={{ padding: 20, textAlign: "center", marginBottom: 16 }}>
              <div className="avatar" style={{ background: "#2d8f5b", width: 64, height: 64, fontSize: 22, margin: "0 auto 12px" }}>MK</div>
              <div style={{ fontWeight: 700, fontSize: 18 }}>Max Kunze</div>
              <div style={{ color: "#888", fontSize: 14, marginTop: 4 }}>max.kunze@email.de</div>
            </div>
            {[["PLZ", "10115 Berlin"], ["Mitglied seit", "März 2026"], ["Abgeschlossene Aufträge", "3"]].map(([k, v]) => (
              <div key={k} className="card" style={{ padding: "12px 16px", marginBottom: 8, display: "flex", justifyContent: "space-between" }}>
                <span style={{ color: "#888", fontSize: 14 }}>{k}</span>
                <span style={{ fontWeight: 600, fontSize: 14 }}>{v}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="tab-bar" style={{ position: "sticky", bottom: 0 }}>
        {[
          ["suche",     <IconSearch />,   "Suche"],
          ["auftraege", <IconList />,     "Aufträge"],
          ["konto",     <IconUser />,     "Konto"],
        ].map(([id, icon, label]) => (
          <div key={id} className={`tab-item${tab === id ? " active" : ""}`} onClick={() => setTab(id)}>
            {icon}<span>{label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── 3. ProviderProfileScreen ─────────────────────────────────────────────────

  return (

            {provider.name.split(" ").map(w => w[0]).join("")}
          </div>
          <div style={{ fontWeight: 800, fontSize: 20 }}>{provider.name}</div>
          <div style={{ color: "#888", fontSize: 14, marginTop: 4 }}>{provider.trade}</div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, marginTop: 8 }}>
            <Stars rating={provider.rating} />
            <span style={{ fontSize: 13, color: "#888" }}>{provider.rating} · {provider.reviews} Bewertungen</span>
          </div>
          <div style={{ marginTop: 10, fontWeight: 700, fontSize: 22, color: "#0f0f0f" }}>

        </div>

        <div className="card" style={{ padding: 16, marginBottom: 16 }}>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 8 }}>Über mich</div>
          <p style={{ color: "#555", fontSize: 14, lineHeight: 1.6 }}>{provider.bio}</p>
        </div>

        <div className="card" style={{ padding: 16, marginBottom: 24 }}>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 12 }}>Leistungen</div>

            </div>
          ))}
        </div>

        <button className="btn-primary" onClick={() => navigate("AuftragAufgebenScreen", { provider })}>
          Anfrage senden
        </button>
      </div>
    </div>
  );
}

// ─── 4. AuftragAufgebenScreen ─────────────────────────────────────────────────
function AuftragAufgebenScreen({ navigate, params }) {
  const provider = params?.provider || PROVIDERS[0];
  const [step, setStep] = useState(1);
  const [desc, setDesc] = useState("");
  const [category, setCategory] = useState("Heizung");
  const [date, setDate] = useState("");
  const [plz, setPlz] = useState("");
  const [budget, setBudget] = useState("");

  const steps = ["Was?", "Wann & Wo?", "Budget?"];

  return (
    <div className="screen" style={{ background: "#f8f7f3" }}>
      <div style={{ background: "#fff", padding: "16px 20px", display: "flex", alignItems: "center", gap: 12, borderBottom: "1px solid #e8e7e3" }}>
        <button onClick={() => navigate("ProviderProfileScreen", { provider })} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, color: "#0f0f0f" }}>

        <span style={{ fontWeight: 700, fontSize: 17 }}>Auftrag aufgeben</span>

            <div className="card" style={{ padding: 16, background: "#f0fdf4", borderColor: "#86efac", border: "2px solid #86efac" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>

        )}

        <div style={{ marginTop: 24 }}>

            <button className="btn-primary" onClick={() => setStep(s => s + 1)}>Weiter →</button>

                <span style={{ fontWeight: 600, fontSize: 14 }}>{v}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="tab-bar" style={{ position: "sticky", bottom: 0 }}>
        {[
          ["uebersicht", <IconHome />,     "Übersicht"],
          ["auftraege",  <IconList />,     "Aufträge"],
          ["kalender",   <IconCalendar />, "Kalender"],
          ["konto",      <IconUser />,     "Konto"],
        ].map(([id, icon, label]) => (
          <div key={id} className={`tab-item${tab === id ? " active" : ""}`} onClick={() => setTab(id)}>
            {icon}<span>{label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── App Root ─────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("LandingScreen");
  const [params, setParams] = useState({});
  const [toast, setToast] = useState({ message: "", visible: false });
  const toastTimer = useRef(null);

  const navigate = (screenName, newParams = {}) => {
    setScreen(screenName);
    setParams(newParams);
  };

  const showToast = (message) => {
    if (toastTimer.current) clearTimeout(toastTimer.current);
    setToast({ message, visible: true });
    toastTimer.current = setTimeout(() => {
      setToast(t => ({ ...t, visible: false }));
    }, 3000);
  };

  const screenProps = { navigate, params, showToast };

  const SCREENS = {
    LandingScreen:          <LandingScreen {...screenProps} />,
    CustomerHomeScreen:     <CustomerHomeScreen {...screenProps} />,
    ProviderProfileScreen:  <ProviderProfileScreen {...screenProps} />,
    AuftragAufgebenScreen:  <AuftragAufgebenScreen {...screenProps} />,
    ChatScreen:             <ChatScreen {...screenProps} />,
    VertragScreen:          <VertragScreen {...screenProps} />,
    BewertungScreen:        <BewertungScreen {...screenProps} />,
    ProviderDashScreen:     <ProviderDashScreen {...screenProps} />,
    AngebotErstellenScreen: <AngebotErstellenScreen {...screenProps} />,
    NachbarschaftScreen:    <NachbarschaftScreen {...screenProps} />,
  };

  return (
    <div className="phone-frame">
      <div className="demo-badge">DEMO</div>
      {SCREENS[screen] || SCREENS["LandingScreen"]}
      <Toast message={toast.message} visible={toast.visible} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
