# CI: Typecheck + Tests bei jedem PR und Push — fängt Regressionen, bevor sie
# in main landen. Bewusst schlank (kein expo export: das macht der Pages-Deploy
# in static.yml selbst; hier zählt schnelles Feedback in ~2-3 Min).
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'claude/**']

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Tests
        run: npx jest --silent

  # DB-Integrationstest: replayt alle Migrationen + prüft Geld-Kern, RLS-Isolation
  # und E-Mail-Gate gegen ein echtes Postgres (scripts/db-test/run.sh im TCP-Modus).
  db-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Ensure psql client
        run: psql --version || (sudo apt-get update && sudo apt-get install -y postgresql-client)
      - name: DB integration tests
        env:
          PGHOST: localhost
          PGPORT: '5432'
          PGUSER: postgres
          PGPASSWORD: postgres
        run: bash scripts/db-test/run.sh
